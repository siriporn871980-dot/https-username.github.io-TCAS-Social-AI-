<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCAS Social AI - คลังข้อสอบจำลอง A-Level สังคมศึกษา</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card {
            background: #1e293b; padding: 40px 30px; border-radius: 24px; max-width: 700px; width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155; transition: all 0.3s ease; text-align: center;
        }

        h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 10px; font-weight: 700; }
        h2 { font-size: 1.3rem; color: #e2e8f0; margin-bottom: 25px; line-height: 1.5; font-weight: 600; text-align: left; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 25px; }

        .fade-in { animation: fadeInEffect 0.35s ease-out forwards; will-change: opacity, transform; }
        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-container { width: 100%; background-color: #334155; border-radius: 9999px; height: 8px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #06b6d4); height: 100%; width: 0%; transition: width 0.3s ease; }
        .info-text { font-size: 0.95rem; color: #38bdf8; margin-bottom: 10px; text-transform: uppercase; font-weight: 600; text-align: left; }

        button {
            background: #2563eb; color: #ffffff; padding: 16px 24px; border: none; border-radius: 14px;
            font-size: 1.05rem; font-weight: 600; margin: 10px 0; cursor: pointer; width: 100%;
            transition: all 0.2s ease; text-align: left; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        button:active:not(:disabled) { transform: translateY(0); }
        
        .btn-center { text-align: center; background: linear-gradient(135deg, #3b82f6, #2563eb); margin-top: 15px; }
        .btn-secondary { background: #475569; text-align: center; margin-top: 5px; }
        .btn-secondary:hover:not(:disabled) { background: #334155; }
        .btn-mode { background: #334155; border: 1px solid #475569; text-align: center; margin: 6px 0; }
        .btn-mode:hover { background: #475569; }

        button.correct { background-color: #10b981 !important; color: white; border: 1px solid #059669; }
        button.wrong { background-color: #ef4444 !important; color: white; border: 1px solid #dc2626; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .score-box { background: #334155; border-radius: 16px; padding: 25px; margin: 20px 0; border: 2px solid #475569; }
        .score-circle {
            width: 120px; height: 120px; border-radius: 50%; background: #0f172a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin: 0 auto 15px; border: 4px solid #38bdf8;
        }
        .score-circle span.raw { font-size: 2.2rem; font-weight: bold; color: #38bdf8; line-height: 1; }
        .score-circle span.label { font-size: 0.9rem; color: #94a3b8; margin-top: 5px; }
        .percent-text { font-size: 1.8rem; color: #10b981; font-weight: bold; margin-bottom: 10px; }

        .category-container { text-align: left; background: #1e293b; border-radius: 12px; padding: 15px; margin: 15px 0; border: 1px solid #334155; }
        .category-title { font-size: 1.05rem; font-weight: bold; color: #38bdf8; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .category-row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 0.95rem; color: #e2e8f0; }

        .stats-dashboard { display: flex; justify-content: space-around; background: #131c2e; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #1e293b; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: #38bdf8; }
        .stat-lbl { font-size: 0.8rem; color: #94a3b8; margin-top: 3px; }

        .review-container { max-height: 450px; overflow-y: auto; text-align: left; margin-top: 20px; padding-right: 10px; }
        .review-container::-webkit-scrollbar { width: 8px; }
        .review-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .review-item { background: #293548; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #475569; }
        .review-item h4 { color: #f8fafc; margin-bottom: 12px; font-size: 1.1rem; line-height: 1.5; }
        .review-choice { padding: 10px 15px; border-radius: 8px; margin-bottom: 6px; font-size: 0.95rem; display: flex; align-items: center; }
        
        .r-correct { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #10b981; font-weight: 600; }
        .r-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
        .r-normal { background: #334155; color: #94a3b8; }
        .badge { margin-left: auto; font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; }
        .explanation-box { margin-top: 12px; padding: 12px; background: #1e293b; border-radius: 8px; border-left: 3px solid #38bdf8; font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card" id="app"></div>

<script>
    // คลังข้อสอบ Master 60 ข้อ (ตรวจสอบความถูกต้องและเติมคำอธิบายครบถ้วน 100%)
    const MASTER_QUIZ = [
        // --- สาระที่ 1: ศาสนา ศีลธรรม จริยธรรม (ข้อ 1-12) ---
        { cat: "ศาสนา", q: "หลักธรรมในข้อใดของพระพุทธศาสนา ที่มีกระบวนการและทัศนคติสอดคล้องกับ 'วิธีการทางวิทยาศาสตร์' มากที่สุด?", a: ["อริยสัจ 4", "พรหมวิหาร 4", "อิทธิบาท 4", "สังคหวัตถุ 4"], correct: 0, explanation: "อริยสัจ 4 มีกระบวนการแก้ปัญหาจากเหตุไปหาผล (ทุกข์=สภาพปัญหา, สมุทัย=สาเหตุ ยึดโยงกับการตั้งสมมติฐาน, นิโรธ=เป้าหมายการแก้ปัญหา, มรรค=แนวปฏิบัติยึดโยงกับการทดลองและลงมือทำ) ซึ่งตรงกับวิธีการทางวิทยาศาสตร์ที่สุด" },
        { cat: "ศาสนา", q: "ผู้พิพากษาที่ทำหน้าที่ตัดสินคดีความอย่างซื่อสัตย์สุจริต โดยไม่หวั่นไหวต่อแรงกดดัน และยอมรับผลการตัดสินตามพยานหลักฐานอย่างเที่ยงธรรม สอดคล้องกับการปฏิบัติตามหลักพรหมวิหาร 4 ในข้อใดชัดเจนที่สุด?", a: ["เมตตา", "กรุณา", "มุทิตา", "อุเบกขา"], correct: 3, explanation: "อุเบกขา ในพรหมวิหาร 4 คือการวางใจเป็นกลางอย่างเที่ยงธรรมตามหลักกฎเกณฑ์ความถูกต้อง ไม่เอนเอียงด้วยความรัก ความชัง หรือแรงกดดันภายนอก ยอมรับผลที่เกิดขึ้นตามกรรมหรือพยานหลักฐาน" },
        { cat: "ศาสนา", q: "การเจริญภาวนาแบบ 'วิปัสสนากรรมฐาน' ในทางพระพุทธศาสนามีจุดมุ่งหมายสูงสุดเพื่อสิ่งใด?", a: ["เพื่อให้จิตสงบระงับจากกิเลสและนิวรณ์ชั่วคราว", "เพื่อให้เกิดอภิญญาและหยั่งรู้อนาคตเพื่อละกิเลส", "เพื่อให้เกิดปัญญาญาณเห็นแจ้งในไตรลักษณ์จนสิ้นอาสวะ", "เพื่อให้จิตแน่วแน่เป็นสมาธิระดับฌานสมาบัติ"], correct: 2, explanation: "วิปัสสนากรรมฐาน มุ่งเน้นการใช้ปัญญาพิจารณาสภาวะธรรมจนเห็นแจ้งใน 'ไตรลักษณ์' (อนิจจัง ทุกขัง อนัตตา) เพื่อตัดกิเลสและบรรลุพระนิพพาน แตกต่างจากสมถกรรมฐานที่มุ่งเน้นความสงบของจิต" },
        { cat: "ศาสนา", q: "ศาสนาในข้อใดจัดอยู่ในกลุ่มประเภท 'อเทวนิยม' (ไม่มีความเชื่อเรื่องพระเจ้าผู้สร้างโลกและลิขิตชะตาชีวิต)?", a: ["ศาสนาคริสต์ และ ศาสนาอิสลาม", "ศาสนาพราหมณ์-ฮินดู และ ศาสนาสิกข์", "ศาสนาพุทธ และ ศาสนาเชน", "ศาสนายูดาห์ และ ศาสนาคริสต์"], correct: 2, explanation: "ศาสนาพุทธ และศาสนาเชน เป็นศาสนาประเภทอเทวนิยม เนื่องจากปฏิเสธการมีอยู่ของพระเจ้าผู้สร้างโลก แต่ให้ความสำคัญกับกฎธรรมชาติ กฎแห่งกรรม และการพึ่งพาตนเองเพื่อความหลุดพ้น" },
        { cat: "ศาสนา", q: "หลักปฏิบัติข้อใดของชาวมุสลิมตามหลักการอิสลาม ที่บัญญัติให้ปฏิบัติบังคับ 'เฉพาะผู้ที่มีความพร้อม' ทางด้านร่างกายและทรัพย์สินเป็นสำคัญ?", a: ["การละหมาด", "การถือศีลอด", "การบริจาคซะกาต", "การประกอบพิธีฮัจญ์"], correct: 3, explanation: "การประกอบพิธีฮัจญ์ ณ นครมักกะฮ์ ถูกบัญญัติให้เป็นหน้าที่ของชาวมุสลิมทุกคนที่มีความพร้อมและสามารถกระทำได้ ทั้งในเรื่องของกำลังทรัพย์และสุขภาพร่างกายตลอดการเดินทาง" },
        { cat: "ศาสนา", q: "คัมภีร์ใดในระบบวรรณกรรมพระเวทของศาสนาพราหมณ์-ฮินดู ที่ได้รับการยอมรับว่าเก่าแก่ที่สุดและเป็นพื้นฐานสำคัญที่สุด?", a: ["คัมภีร์สามเวท", "คัมภีร์อาถรรพเวท", "คัมภีร์ฤคเวท", "คัมภีร์ยชุรเวท"], correct: 2, explanation: "คัมภีร์ฤคเวท เป็นคัมภีร์ที่เก่าแก่ที่สุดในบรรดาสังหิตาทั้ง 4 ของพระเวท รวบรวมบทสวดสรรเสริญเทพเจ้าในยุคเริ่มแรกของชาวอารยัน" },
        { cat: "ศาสนา", q: "วันสำคัญทางพระพุทธศาสนาวันใดที่มีเหตุการณ์มหัศจรรย์ 'จาตุรงคสันนิบาต' และเป็นวันที่มีการแสดงโอวาทปาติโมกข์?", a: ["วันวิสาขบูชา", "วันอาสาฬหบูชา", "วันมาฆบูชา", "วันอัฏฐมีบูชา"], correct: 2, explanation: "วันมาฆบูชา เกิดเหตุการณ์จาตุรงคสันนิบาต (พระสงฆ์ 1,250 รูปมาประชุมกันโดยมิได้นัดหมาย เป็นพระอรหันต์ และได้รับการอุปสมบทแบบเอหิภิกขุอุปสัมปทา) พระพุทธองค์จึงทรงแสดงโอวาทปาติโมกข์อันเป็นหัวใจของพระพุทธศาสนา" },
        { cat: "ศาสนา", q: "แนวคิดความเชื่อเรื่อง 'บาปกำเนิด' (Original Sin) ที่ส่งผ่านจากมนุษย์คู่แรกของโลก ถือเป็นแกนหลักคำสอนที่สำคัญของศาสนาใด?", a: ["ศาสนาพุทธ", "ศาสนาคริสต์", "ศาสนาอิสลาม", "ศาสนาพราหมณ์-ฮินดู"], correct: 1, explanation: "ศาสนาคริสต์สอนเรื่องบาปกำเนิด ซึ่งเป็นบาปที่ติดตัวมนุษย์ทุกคนมาตั้งแต่เกิดอันเนื่องมาจากการไม่เชื่อฟังพระเจ้าของอาดัมและอีฟในสวนเอเดน และพระเยซูเสด็จมาเพื่อไถ่บาปนี้ให้กับมวลมนุษย์" },
        { cat: "ศาสนา", q: "หลักธรรมคำสอนเรื่อง 'ปฏิจจสมุปบาท' ในพระพุทธศาสนา มุ่งเน้นสอนให้มนุษย์ทำความเข้าใจเกี่ยวกับเรื่องใดเป็นสำคัญ?", a: ["ความเป็นเหตุเป็นผลของสิ่งทั้งหลายที่พึ่งพาเกี่ยวเนื่องกันเกิดขึ้น", "การเวียนว่ายตายเกิดในสังสารวัฏของจิตวิญญาณ", "แนวทางการปฏิบัติตนตามทางสายกลางเพื่อความหลุดพ้น", "การจำแนกกรรมและผลของกรรมตามเจตนา"], correct: 0, explanation: "ปฏิจจสมุปบาท คือ หลักธรรมที่ว่าด้วยสิ่งทั้งหลายอาศัยกันและกันจึงเกิดขึ้น เป็นกฎแห่งเหตุและผลทางธรรมชาติ (เมื่อสิ่งนี้มี สิ่งนี้จึงมี เนื่องด้วยสิ่งนี้ดับ สิ่งนี้จึงดับ)" },
        { cat: "ศาสนา", q: "นิกายมหายานในพระพุทธศาสนา มีอุดมคติและจุดเด่นหลักในข้อใดที่แตกต่างจากนิกายเถรวาทอย่างชัดเจนที่สุด?", a: ["การรักษาพระธรรมวินัยเดิมดั้งเดิมไว้อย่างเคร่งครัดไม่เปลี่ยนแปลง", "การมุ่งเน้นอุดมคติพระโพธิสัตว์เพื่อบำเพ็ญบารมีช่วยเหลือสรรพสัตว์ให้หลุดพ้นร่วมกัน", "การปฏิเสธการทำสมาธิขั้นสูงและเน้นเฉพาะการสวดมนต์อ้อนวอน", "การไม่เชื่อในเรื่องการหลุดพ้นหรือนิพพานในชาตินี้"], correct: 1, explanation: "นิกายมหายานเน้น 'อุดมคติพระโพธิสัตว์' คือการบำเพ็ญบารมีเพื่อช่วยรื้อขนสรรพสัตว์ให้พ้นทุกข์ไปด้วยกันก่อน ส่วนเถรวาทจะเน้นสาวกภูมิ มุ่งปฏิบัติเพื่อความหลุดพ้นของตนเองเป็นหลักตามพระธรรมวินัยดั้งเดิม" },
        { cat: "ศาสนา", q: "การที่นักเรียนจดจ่อ มีสมาธิแน่วแน่ ทุ่มเทความสนใจ และไม่ปล่อยปละละเลยต่อการทบทวนตำราเรียนเพื่อสอบเข้ามหาวิทยาลัยอย่างต่อเนื่อง สอดคล้องกับหลักธรรมข้อใดในอิทธิบาท 4?", a: ["ฉันทะ", "วิริยะ", "จิตตะ", "วิมังสา"], correct: 2, explanation: "จิตตะ ในอิทธิบาท 4 คือ ความตั้งจิตรับรู้ เอาใจฝักใฝ่ มีสมาธิจดจ่ออยู่กับสิ่งที่ทำอย่างไม่ทอดทิ้ง ส่วนฉันทะคือความพอใจ วิริยะคือความเพียร และวิมังสาคือการใช้ปัญญาไตร่ตรอง" },
        { cat: "ศาสนา", q: "คริสต์ศาสนานิกายใดที่มีโครงสร้างการบริหารที่ปฏิเสธอำนาจสูงสุดของพระสันตะปาปา ไม่มีนักบวชชั้นผู้ใหญ่ แต่มีศาสนาจารย์เป็นผู้นำจิตวิญญาณ?", a: ["โรมันคาทอลิก", "ออร์โธดอกซ์", "โปรเตสแตนต์", "แองกลิกัน"], correct: 2, explanation: "นิกายโปรเตสแตนต์ เกิดจากการปฏิรูปศาสนา ปฏิเสธอำนาจของพระสันตะปาปา ถือว่ามนุษย์ทุกคนสามารถเข้าถึงพระเจ้าได้โดยตรงผ่านพระคัมภีร์ จึงไม่มีคณะนักบวช (บาทหลวง) แต่มีศาสนาจารย์ทำหน้าที่แนะนำพิธีกรรม" },

        // --- สาระที่ 2: หน้าที่พลเมือง วัฒนธรรม และการดำเนินชีวิตในสังคม (ข้อ 13-24) ---
        { cat: "หน้าที่พลเมือง", q: "กฎหมายในข้อใดจัดอยู่ในกลุ่มประเภท 'กฎหมายมหาชน' (Public Law) ซึ่งจัดวางความสัมพันธ์ระหว่างรัฐกับเอกชน?", a: ["ประมวลกฎหมายแพ่งและพาณิชย์", "กฎหมายลิขสิทธิ์และสิทธิบัตร", "รัฐธรรมนูญและกฎหมายอาญา", "กฎหมายว่าด้วยตั๋วเงินและหุ้นส่วน"], correct: 2, explanation: "กฎหมายมหาชน คือกฎหมายที่กำหนดความสัมพันธ์ระหว่างรัฐกับประชาชนในฐานะที่รัฐเป็นผู้ปกครอง เช่น รัฐธรรมนูญ กฎหมายอาญา กฎหมายปกครอง ส่วนกฎหมายแพ่งและพาณิชย์จัดเป็นกฎหมายเอกชน" },
        { cat: "หน้าที่พลเมือง", q: "เงื่อนไขตามกฎหมายแพ่งและพาณิชย์ระบุว่า การสมรสในประเทศไทยจะมีความสมบูรณ์ตามกฎหมายเมื่อใด?", a: ["เมื่อมีการจัดพิธีแต่งงานและหลั่งน้ำพระพุทธมนต์ตามประเพณี", "เมื่อชายและหญิงได้ทำการจดทะเบียนสมรสต่อหน้าต่อนายทะเบียน", "เมื่อชายหญิงอยู่กินฉันสามีภรรยาเปิดเผยต่อสังคมเกิน 1 ปี", "เมื่อบิดามารดาทั้งสองฝ่ายลงนามรับทราบข้อตกลงร่วมกัน"], correct: 1, explanation: "การสมรสตามกฎหมายไทยจะมีผลสมบูรณ์ก็ต่อเมื่อได้ทำการ 'จดทะเบียนสมรส' ตามที่กฎหมายกำหนดไว้เท่านั้น การจัดพิธีแต่งงานตามประเพณีหรือการอยู่กินร่วมกันไม่มีผลผูกพันทางกฎหมายครอบครัว" },
        { cat: "หน้าที่พลเมือง", q: "การกระทำความผิดทางอาญาในข้อใด ที่กฎหมายบัญญัติให้เป็น 'ความผิดอันยอมความได้' หรือความผิดต่อส่วนตัว?", a: ["ความผิดฐานฆ่าผู้อื่นโดยเจตนา", "ความผิดฐานยักยอกทรัพย์หรือฉ้อโกงทรัพย์", "ความผิดฐานชิงทรัพย์โดยมีอาวุธ", "ความผิดฐานปล้นทรัพย์"], correct: 1, explanation: "ความผิดฐานยักยอกและฉ้อโกงทรัพย์เป็นความผิดต่อส่วนตัวที่ยอมความกันได้ตามกฎหมาย หากผู้เสียหายถอนคำร้องทุกข์ คดีอาญาเป็นอันระงับ ต่างจากคดีฆ่าคนตายหรือชิงทรัพย์ที่เป็นความผิดต่อแผ่นดิน ยอมความไม่ได้" },
        { cat: "หน้าที่พลเมือง", q: "องค์กรอิสระตามรัฐธรรมนูญฉบับปัจจุบันองค์กรใดที่มีหน้าที่หลักในการตรวจสอบและไต่สวนการทุจริตประพฤติมิชอบของเจ้าหน้าที่รัฐและผู้ดำรงตำแหน่งทางการเมือง?", a: ["ศาลปกครองสูงสุด", "ผู้ตรวจการแผ่นดิน", "คณะกรรมการป้องกันและปราบปรามการทุจริตแห่งชาติ (ป.ป.ช.)", "ศาลรัฐธรรมนูญ"], correct: 2, explanation: "คณะกรรมการ ป.ป.ช. มีหน้าที่หลักโดยตรงในการตรวจสอบทรัพย์สิน และไต่สวนข้อเท็จจริงกรณีเจ้าหน้าที่รัฐหรือนักการเมืองถูกกล่าวหาว่าร่ำรวยผิดปกติหรือทุจริตต่อหน้าที่" },
        { cat: "หน้าที่พลเมือง", q: "ข้อใดคือลักษณะเด่นที่เป็นแกนหลักของระบอบการปกครองแบบ 'เผด็จการเบ็ดเสร็จ' (Totalitarianism)?", a: ["ประชาชนมีเสรีภาพทางเศรษฐกิจอย่างเต็มที่ แต่ห้ามยุ่งเกี่ยวกับการเมือง", "รัฐเข้าควบคุมและจัดระเบียบทุกด้านของวิถีชีวิตประชากร ทั้งการเมือง เศรษฐกิจ สังคม และความคิด", "อำนาจอธิปไตยแบ่งแยกชัดเจนแต่บริหารโดยสภาทหารชุดเดียว", "การสืบทอดอำนาจผ่านสายโลหิตในระบบพ่อปกครองลูก"], correct: 1, explanation: "ระบอบเผด็จการเบ็ดเสร็จ รัฐจะเข้าควบคุมชีวิตของประชาชนทุกมิติ ไม่เว้นแม้กระทั่งเรื่องส่วนตัว สังคม และสื่อสารมวลชน เพื่ออุดมการณ์ของรัฐบาลเพียงหนึ่งเดียว" },
        { cat: "หน้าที่พลเมือง", q: "สถาบันทางสังคมใดที่มีบทบาทสำคัญและเป็นรากฐานอันดับแรกสุดในการทำหน้าที่ 'ขัดเกลาทางสังคมขั้นปฐมภูมิ' (Primary Socialization) แก่มนุษย์?", a: ["สถาบันการศึกษา", "สถาบันศาสนา", "สถาบันสื่อสารมวลชน", "สถาบันครอบครัว"], correct: 3, explanation: "สถาบันครอบครัวเป็นสถาบันแรกสุดที่ทำหน้าที่ขัดเกลาทางสังคม คอยอบรมสั่งสอนค่านิยม ภาษา และพฤติกรรมพื้นฐานให้แก่สมาชิกตั้งแต่แรกเกิด ซึ่งเรียกว่ากระบวนการขัดเกลาขั้นปฐมภูมิ" },
        { cat: "หน้าที่พลเมือง", q: "โครงสร้างการปกครองส่วนท้องถิ่นรูปแบบพิเศษของประเทศไทยในปัจจุบัน ประกอบด้วยหน่วยงานใดบ้าง?", a: ["เทศบาลนคร และ องค์การบริหารส่วนตำบล", "กรุงเทพมหานคร และ เมืองพัทยา", "องค์การบริหารส่วนจังหวัด และ เทศบาลเมือง", "กรุงเทพมหานคร และ จังหวัดภูเก็ต"], correct: 1, explanation: "ประเทศไทยมีการจัดระเบียบบริหารราชการส่วนท้องถิ่นรูปแบบพิเศษอยู่ 2 แห่งในปัจจุบัน คือ กรุงเทพมหานคร (กทม.) และ เมืองพัทยา เนื่องจากเป็นพื้นที่เขตเมืองหลวงและเขตเศรษฐกิจท่องเที่ยวพิเศษ" },
        { cat: "หน้าที่พลเมือง", q: "ตามหลักรัฐศาสตร์สากล ข้อใดคือองค์ประกอบของ 'รัฐ' (State) ที่ถูกต้อง สมบูรณ์ และขาดองค์ประกอบใดองค์ประกอบหนึ่งไปไม่ได้?", a: ["ประชากร, ดินแดนที่แน่นอน, รัฐบาล, รัฐธรรมนูญ", "ประชากร, ดินแดนที่แน่นอน, รัฐบาล, อำนาจอธิปไตย", "ประชากร, เมืองหลวงที่เป็นศูนย์กลาง, รัฐบาล, กองทัพ", "ประชากร, ดินแดน, อำนาจอธิปไตย, เสรีภาพทางเศรษฐกิจ"], correct: 1, explanation: "องค์ประกอบของรัฐตามหลักวิชารัฐศาสตร์สากล ต้องประกอบด้วย 4 ส่วนหลักคือ 1. ประชากร 2. ดินแดนที่มีอาณาเขตแน่นอน 3. รัฐบาลที่มีประสิทธิภาพ และ 4. อำนาจอธิปไตย (ความอิสระเด็ดขาดในการปกครองตนเอง)" },
        { cat: "หน้าที่พลเมือง", q: "วัฒนธรรมในข้อใดจัดอยู่ในประเภท 'เนติธรรม' (Legal Culture) ที่ส่งผลต่อความสงบเรียบร้อยในสังคม?", a: ["สิ่งปลูกสร้าง โบราณสถาน และวัตถุโบราณ", "หลักธรรมทางศาสนาและความซื่อสัตย์สุจริต", "ประมวลกฎหมาย กฎระเบียบข้อบังคับ และจารีตประเพณีที่มีบทลงโทษ", "มารยาททางสังคม การแต่งกาย และการทักทาย"], correct: 2, explanation: "เนติธรรม คือ วัฒนธรรมทางกฎหมาย รวมถึงระเบียบข้อบังคับ ขนบธรรมเนียมที่มีกฎเกณฑ์ข้อบังคับควบคุมความประพฤติของคนในสังคมให้เป็นระเบียบเรียบร้อย ขัดขืนจะมีบทลงโทษชัดเจน" },
        { cat: "หน้าที่พลเมือง", q: "การดาวน์โหลดโปรแกรมคอมพิวเตอร์หรือภาพยนตร์ที่มีลิขสิทธิ์มาใช้งานหรือแจกจ่ายโดยไม่ได้รับอนุญาต ถือเป็นการละเมิดสิทธิในกฎหมายลักษณะใด?", a: ["กฎหมายลักษณะอาญาแผ่นดินเท่านั้น", "กฎหมายลักษณะแพ่งว่าด้วยนิติกรรมสัญญา", "กฎหมายทรัพย์สินทางปัญญา", "กฎหมายพาณิชย์พาณิชยกรรม"], correct: 2, explanation: "การละเมิดผลงานสร้างสรรค์ โปรแกรมคอมพิวเตอร์ หรือภาพยนตร์ จัดเป็นการละเมิด 'กฎหมายทรัพย์สินทางปัญญา' (เช่น กฎหมายลิขสิทธิ์) ซึ่งมีระบุบทลงโทษไว้เฉพาะทาง" },
        { cat: "หน้าที่พลเมือง", q: "ในระบอบประชาธิปไตยระบบรัฐสภา หากสภาผู้แทนราษฎรมีมติลงคะแนน 'ไม่ไว้วางใจ' นายกรัฐมนตรี จะส่งผลทางข้อกฎหมายอย่างไร?", a: ["นายกรัฐมนตรีและคณะรัฐมนตรีต้องพ้นจากตำแหน่งทั้งคณะ", "ประธานสภาผู้แทนราษฎรต้องทำการประกาศยุบสภาทันที", "ประธานรัฐสภาจะรักษาการในตำแหน่งนายกรัฐมนตรีโดยอัตโนมัติ", "เรื่องจะถูกส่งให้ศาลรัฐธรรมนูญวินิจฉัยความถูกต้องอีกครั้ง"], correct: 0, explanation: "หากสภาผู้แทนราษฎรลงมติไม่ไว้วางใจด้วยคะแนนเสียงมากกว่ากึ่งหนึ่ง นายกรัฐมนตรีและคณะรัฐมนตรีต้องพ้นจากตำแหน่งทั้งคณะทันทีตามหลักความรับผิดชอบร่วมกันต่อสภา" },
        { cat: "หน้าที่พลเมือง", q: "เอกสารระหว่างประเทศฉบับใดที่องค์การสหประชาชาติประกาศใช้ เพื่อเป็นมาตรฐานสากลในการคุ้มครองศักดิ์ศรีและความเท่าเทียมของมนุษย์ทุกคนหลังสงครามโลกครั้งที่ 2?", a: ["สนธิสัญญาแวร์ซายส์", "กติการะหว่างประเทศว่าด้วยสิทธิพลเมือง", "ปฏิญญาสากลว่าด้วยสิทธิมนุษยชน (UDHR)", "อนุสัญญาเจนีวา"], correct: 2, explanation: "ปฏิญญาสากลว่าด้วยสิทธิมนุษยชน (UDHR) ได้รับการรับรองโดยสมัชชาใหญ่แห่งสหประชาชาติในปี พ.ศ. 2491 เพื่อเป็นแนวทางและกรอบสากลในการปกป้องสิทธิมนุษยชนของประชากรโลกทุกคน" },

        // --- สาระที่ 3: เศรษฐศาสตร์ (ข้อ 25-36) ---
        { cat: "เศรษฐศาสตร์", q: "ปัญหาพื้นฐานทางเศรษฐศาสตร์ (What, How, For whom) เกิดขึ้นจากสภาวการณ์ใดในโลกแห่งความเป็นจริง?", a: ["ระบบการกระจายรายได้และโอกาสที่ไม่เท่าเทียมกันของประชากร", "ความต้องการของมนุษย์มีไม่จำกัด แต่ทรัพยากรทางเศรษฐกิจมีอยู่จำกัด", "การที่รัฐบาลเข้ามาควบคุมและแทรกแซงราคาตลาดจนกลไกราคาล้มเหลว", "การเปลี่ยนแปลงของระดับราคาสินค้าเนื่องจากอัตราเงินเฟ้อ"], correct: 1, explanation: "ปัญหาพื้นฐานทางเศรษฐศาสตร์เกิดจากความขัดแย้งระหว่าง 'ความต้องการที่มีไม่จำกัด' ของมนุษย์ กับ 'ความขาดแคลนของทรัพยากร' ที่มีจำกัด สังคมจึงต้องเลือกผลิตให้เกิดประโยชน์สูงสุด" },
        { cat: "เศรษฐศาสตร์", q: "โครงสร้างตลาดประเภทใดที่มีผู้ขายในระบบเพียงไม่กี่ราย แต่ละรายมีส่วนแบ่งตลาดสูง และการปรับราคาของรายใดรายหนึ่งจะกระทบต่อคู่แข่งรายอื่นอย่างรุนแรง?", a: ["ตลาดแข่งขันสมบูรณ์", "ตลาดผูกขาดแท้จริง", "ตลาดผู้ขายน้อยราย", "ตลาดกึ่งแข่งขันกึ่งผูกขาด"], correct: 2, explanation: "ตลาดผู้ขายน้อยราย (Oligopoly) มีผู้ผลิตเพียงไม่กี่รายใหญ่ เช่น ธุรกิจค่ายมือถือ ปูนซีเมนต์ หรือน้ำอัดลม ซึ่งการแข่งขันจะเน้นการโฆษณาและการบริการมากกว่าการตัดราคา เพราะกระทบต่อคู่แข่งโดยตรง" },
        { cat: "เศรษฐศาสตร์", q: "ตาม 'กฎของอุปสงค์' (Law of Demand) ภายใต้เงื่อนไขที่ปัจจัยอื่นๆ คงที่ พฤติกรรมของผู้บริโภคที่มีต่อราคาสินค้าจะเป็นอย่างไร?", a: ["เมื่อราคาสินค้าชนิดนั้นปรับตัวสูงขึ้น ปริมาณความต้องการซื้อจะลดลง", "เมื่อราคาสินค้าชนิดนั้นปรับตัวสูงขึ้น ปริมาณความต้องการซื้อจะเพิ่มขึ้น", "เมื่อราคาสินค้าชนิดนั้นปรับตัวลดลง ปริมาณความต้องการผลิตจะเพิ่มขึ้น", "ราคาสินค้าและปริมาณความต้องการซื้อจะแปรผันตรงตามกัน"], correct: 0, explanation: "กฎของอุปสงค์ระบุว่า ปริมาณความต้องการซื้อสินค้าจะแปรผกผัน (ตรงข้าม) กับราคาสินค้าชนิดนั้นเสมอ กล่าวคือ เมื่อของแพงขึ้นคนจะซื้อน้อยลง เมื่อของถูกลงคนจะซื้อมากขึ้น" },
        { cat: "เศรษฐศาสตร์", q: "หากระบบเศรษฐกิจกำลังเผชิญกับภาวะ 'เงินเฟ้อรุนแรง' (ราคาสินค้าแพงขึ้นรวดเร็ว) ธนาคารกลางและรัฐบาลควรดำเนินนโยบายเศรษฐกิจในลักษณะใดเพื่อควบคุมปัญหา?", a: ["ลดอัตราดอกเบี้ยนโยบายและลดอัตราภาษีมูลค่าเพิ่ม", "เพิ่มการใช้จ่ายงบประมาณของรัฐบาลและประกาศซื้อพันธบัตรรัฐบาลคืนจากเอกชน", "เพิ่มอัตราดอกเบี้ยนโยบายและปรับเพิ่มอัตราภาษีอากรหรือใช้งบประมาณแบบเกินดุล", "ลดอัตราเงินสดสำรองตามกฎหมายของธนาคารพาณิชย์"], correct: 2, explanation: "การแก้เงินเฟ้อต้องดึงเงินออกจากระบบ เศรษฐกิจชะลอตัวลง รัฐจึงต้องใช้นโยบายการคลังแบบหดตัว (เพิ่มภาษี/ลดรายจ่ายรัฐ) และธนาคารกลางใช้นโยบายการเงินแบบเข้มงวด (เพิ่มดอกเบี้ย)" },
        { cat: "เศรษฐศาสตร์", q: "เครื่องชี้วัดทางเศรษฐกิจใดที่ใช้คำนวณมูลค่ารวมของสินค้าและบริการขั้นสุดท้ายที่ผลิตขึ้น 'ภายในขอบเขตอาณาเขตของประเทศ' ในรอบระยะเวลาหนึ่ง โดยไม่คำนึงถึงสัญชาติของเจ้าของปัจจัยการผลิต?", a: ["ผลิตภัณฑ์ประชาชาติต้นทุนรวม (GNP)", "ผลิตภัณฑ์มวลรวมภายในประเทศ (GDP)", "รายได้ประชาชาติสุทธิ (NI)", "รายได้เฉลี่ยต่อหัวประชากร (PCI)"], correct: 1, explanation: "GDP (Gross Domestic Product) คือ มูลค่าตลาดของสินค้าและบริการขั้นสุดท้ายทั้งหมดที่ผลิตขึ้นภายในอาณาเขตของประเทศนั้นๆ ในช่วงเวลาหนึ่งๆ โดยเน้นพื้นที่อาณาเขตเป็นสำคัญ" },
        { cat: "เศรษฐศาสตร์", q: "แนวคิดทฤษฎีการค้าระหว่างประเทศของ เดวิด ริคาร์โด ที่สนับสนุนให้แต่ละประเทศเลือกผลิตสินค้าที่ตนเองมีต้นทุนค่าเสียโอกาสต่ำที่สุด เรียกว่าทฤษฎีใด?", a: ["ทฤษฎีความได้เปรียบโดยสัมบูรณ์ (Absolute Advantage)", "ทฤษฎีความได้เปรียบโดยเปรียบเทียบ (Comparative Advantage)", "ทฤษฎีพาณิชยนิยมและการตั้งกำแพงภาษี", "ทฤษฎีดุลยภาพการค้าเสรีสมบูรณ์"], correct: 1, explanation: "ทฤษฎีความได้เปรียบโดยเปรียบเทียบ (Comparative Advantage) เสนอว่า แม้ประเทศหนึ่งจะเสียเปรียบในการผลิตสินค้าทุกชนิด แต่ถ้าเลือกผลิตสินค้าที่มีต้นทุนค่าเสียโอกาสต่ำที่สุดเมื่อเทียบกับอีกประเทศ แล้วนำมาค้าขายกัน ก็จะเกิดประโยชน์สูงสุด" },
        { cat: "เศรษฐศาสตร์", q: "ระบบเศรษฐกิจแบบ 'ทุนนิยมบริสุทธิ์' (Pure Capitalism) มีลักษณะเด่นที่เป็นเสาหลักสำคัญที่สุดตามข้อใด?", a: ["เอกชนมีกรรมสิทธิ์ในทรัพย์สินอย่างเต็มที่ และกิจกรรมทางเศรษฐกิจถูกขับเคลื่อนผ่าน 'กลไกราคา' โดยรัฐไม่แทรกแซง", "รัฐบาลทำหน้าที่เป็นเจ้าของปัจจัยการผลิตหลักและวางแผนจากส่วนกลาง", "การเน้นจัดสวัสดิการที่เท่าเทียมและจำกัดการสะสมทุนของภาคเอกชน", "รัฐบาลเป็นผู้กำหนดราคาสินค้าขั้นพื้นฐานและโควตาการผลิตทั้งหมด"], correct: 0, explanation: "เสาหลักของระบบทุนนิยมคือ 1. เสรีภาพในการดำเนินธุรกิจ 2. การมีกรรมสิทธิ์ในทรัพย์สินของเอกชน และ 3. การใช้กลไกราคาหรือระบบตลาดในการจัดสรรทรัพยากรโดยที่รัฐบาลไม่มีส่วนแทรกแซงราคา" },
        { cat: "เศรษฐศาสตร์", q: "ภาษีประเภทใดที่จัดเป็น 'ภาษีทางตรง' (Direct Tax) ซึ่งผู้ที่มีหน้าที่ตามกฎหมายไม่สามารถผลักภาระภาษีไปให้ผู้บริโภครายอื่นได้?", a: ["ภาษีมูลค่าเพิ่ม (VAT)", "ภาษีสรรพสามิต", "ภาษีเงินได้บุคคลธรรมดา", "ภาษีศุลกากร"], correct: 2, explanation: "ภาษีทางตรง คือ ภาษีที่ผู้มีหน้าที่เสียภาษีต้องรับภาระไว้เอง ไม่สามารถผลักภาระไปให้ผู้อื่นได้ เช่น ภาษีเงินได้บุคคลธรรมดา ภาษีเงินได้นิติบุคคล ต่างจากภาษีทางอ้อม เช่น VAT หรือภาษีสรรพสามิต ที่หักรวมไปในราคาสินค้าได้" },
        { cat: "เศรษฐศาสตร์", q: "หลักการดำเนินงานของ 'สหกรณ์' ในข้อใดที่ทำให้เกิดความแตกต่างจากรูปแบบการดำเนินธุรกิจของบริษัทจำกัดทั่วไปอย่างชัดเจนที่สุด?", a: ["การมุ่งแสวงหากำไรสูงสุดเพื่อนำมาแบ่งปันผลประโยชน์ตามสัดส่วนหุ้น", "การจำกัดสิทธิ์สมาชิกเฉพาะผู้ที่มีส่วนได้ส่วนเสียในชุมชนเดียวกันเท่านั้น", "การยึดหลักประชาธิปไตยโดยสมาชิก 1 คนมีสิทธิ์ออกเสียงได้ 1 เสียง (ไม่ขึ้นกับจำนวนหุ้น)", "การบริหารงานโดยรัฐบาลเป็นผู้แต่งตั้งประธานกรรมการ"], correct: 2, explanation: "สหกรณ์ยึดหลักประชาธิปไตยสากล คือ สมาชิก 1 คน มีสิทธิ์ลงคะแนนเสียงได้เพียง 1 เสียง (One Man, One Vote) เสมอกัน โดยไม่สนใจว่าสมาชิกคนนั้นจะมีจำนวนหุ้นมากหรือน้อยเพียงใด ต่างจากบริษัททั่วไปที่นับตามสัดส่วนหุ้น" },
        { cat: "เศรษฐศาสตร์", q: "ตามปรัชญาของเศรษฐกิจพอเพียง โครงสร้างคุณลักษณะ '3 ห่วง 2 เงื่อนไข' ในส่วนของ 'เงื่อนไขความรู้และเงื่อนไขคุณธรรม' ทำหน้าที่อย่างไรในระบบ?", a: ["เป็นฐานรองรับและกำกับการตัดสินใจในความพอประมาณ ความมีเหตุผล และการมีภูมิคุ้มกัน", "เป็นเป้าหมายปลายทางที่ต้องการให้เกิดขึ้นในภาคเกษตรกรรมแบบผสมผสาน", "เป็นตัวขับเคลื่อนเพื่อการแข่งขันทางการค้ากับระบบทุนนิยมระดับสากล", "เป็นปัจจัยการผลิตพื้นฐานแทนที่ที่ดิน แรงงาน และทุน"], correct: 0, explanation: "เงื่อนไขความรู้และคุณธรรม เป็น 2 เงื่อนไขพื้นฐานที่จำเป็นต้องมี เพื่อใช้เป็นแนวทางและกำกับการตัดสินใจให้ห่วงทั้ง 3 (พอประมาณ มีเหตุผล มีภูมิคุ้มกัน) ดำเนินไปอย่างถูกต้อง ถูกวิธี และเกิดความสมดุล" },
        { cat: "เศรษฐศาสตร์", q: "สถานการณ์ที่ค่าเงินบาทของประเทศไทยเกิดการ 'แข็งค่าขึ้น' อย่างรวดเร็วเมื่อเทียบกับดอลลาร์สหรัฐ จะส่งผลกระทบเชิงบวก (เป็นประโยชน์) ต่อบุคคลในกลุ่มใดมากที่สุด?", a: ["ผู้ประกอบการส่งออกสินค้าเกษตรกรรมไทยไปขายยังต่างประเทศ", "ผู้ประกอบการนำเข้าเครื่องจักรและวัตถุดิบจากต่างประเทศ", "ธุรกิจการท่องเที่ยวในประเทศที่เน้นรับเงินจากนักท่องเที่ยวต่างชาติ", "แรงงานไทยที่ไปทำงานในสหรัฐอเมริกาและส่งเงินกลับมาให้ครอบครัว"], correct: 1, explanation: "เงินบาทแข็งค่า หมายถึง ใช้เงินบาทน้อยลงเพื่อแลก 1 ดอลลาร์ (เช่น จาก 36 บาท เหลือ 33 บาท) ส่งผลดีต่อผู้นำเข้าเพราะซื้อสินค้าจากต่างประเทศได้ในราคาที่ถูกลง แต่ส่งผลเสียต่อผู้ส่งออกและธุรกิจท่องเที่ยว" },
        { cat: "เศรษฐศาสตร์", q: "การจัดตั้งเป้าหมายของ 'ประชาคมเศรษฐกิจอาเซียน' (AEC) มุ่งเน้นการยกระดับภูมิภาคไปสู่ลักษณะใดเป็นสำคัญ?", a: ["การรวมกลุ่มเพื่อใช้ระบบสกุลเงินเดียวกันเหมือนสหภาพยุโรป", "การจัดตั้งสภานิติบัญญัติร่วมเพื่อออกกฎหมายเศรษฐกิจเดียวกัน", "การเปิดตลาดเสรีที่มีการเคลื่อนย้ายสินค้า บริการ การลงทุน และแรงงานฝีมืออย่างเสรี", "การร่วมมือกันกำหนดโควตาราคาน้ำมันและพลังงานในตลาดโลก"], correct: 2, explanation: "เป้าหมายหลักของ AEC คือ การทำให้ภูมิภาคอาเซียนเป็นตลาดและฐานการผลิตร่วมกันเดี่ยว (Single Market and Production Base) โดยเน้นให้มีการเคลื่อนย้ายสินค้า บริการ เงินทุน และแรงงานฝีมือ 8 วิชาชีพได้อย่างเสรี" },

        // --- สาระที่ 4: ประวัติศาสตร์ (ข้อ 37-48) ---
        { cat: "ประวัติศาสตร์", q: "ในขั้นตอนของ 'วิธีการทางประวัติศาสตร์' ขั้นตอนใดที่ถือเป็นจุดเริ่มแรกสุดเพื่อกำหนดกรอบและขอบเขตของการศึกษาค้นคว้าข้อมูล?", a: ["การรวบรวมหลักฐานทางประวัติศาสตร์", "การประเมินความน่าเชื่อถือของหลักฐาน (การวิพากษ์วิธี)", "การกำหนดหัวข้อหรือประเด็นปัญหาที่ต้องการศึกษา", "การวิเคราะห์และตีความข้อมูล"], correct: 2, explanation: "ขั้นตอนแรกสุดของวิธีการทางประวัติศาสตร์คือ การตั้งประเด็นปัญหาหรือกำหนดหัวข้อที่ต้องการศึกษา เพื่อกำหนดขอบเขต เวลา และแนวทางในการไปรวบรวมหลักฐานในขั้นต่อไป" },
        { cat: "ประวัติศาสตร์", q: "ผลกระทบที่สำคัญที่สุดในทางโครงสร้างระบบเศรษฐกิจของไทย จากการลงนามใน 'สนธิสัญญาเบาว์ริง' สมัยรัชกาลที่ 4 คือข้อใด?", a: ["ไทยปรับเปลี่ยนโครงสร้างจากเศรษฐกิจแบบพึ่งตนเองมาเป็นระบบเศรษฐกิจแบบเพื่อการค้าโลก", "ระบบพระคลังสินค้าสามารถควบคุมและผูกขาดการค้ากับต่างประเทศได้เบ็ดเสร็จยิ่งขึ้น", "ไทยกลายเป็นประเทศที่เสียเปรียบดุลการค้ารุนแรงจนคลังหลวงขาดดุลทันที", "เกิดการประกาศยกเลิกการใช้เงินตราและหันไปใช้ระบบแลกเปลี่ยนสิ่งของแทน"], correct: 0, explanation: "สนธิสัญญาเบาว์ริงทำให้ระบบการค้าแบบผูกขาดโดยพระคลังสินค้าสิ้นสุดลง เกิดการค้าเสรี และเปลี่ยนระบบเศรษฐกิจไทยจากแบบ 'ผลิตเพื่อเลี้ยงชีพหรือยังชีพ' ไปสู่ระบบเศรษฐกิจแบบ 'เพื่อการค้าเสรีระดับโลก'" },
        { cat: "ประวัติศาสตร์", q: "เหตุการณ์ในข้อใดที่ถือเป็นการปฏิรูปโครงสร้างการบริหารราชการแผ่นดินสู่ความทันสมัยระดับรากฐานตามแบบสากลในสมัยพระบาทสมเด็จพระจุลจอมเกล้าเจ้าอยู่หัว (รัชกาลที่ 5)?", a: ["การประกาศใช้ พ.ร.บ. เลิกทาสทั่วราชอาณาจักร", "การยกเลิกระบบจตุสดมภ์และจัดตั้งกระทรวงทำหน้าที่เฉพาะทาง 12 กระทรวง", "การสร้างเส้นทางรถไฟสายแรกจากกรุงเทพฯ ไปนครราชสีมา", "การเปิดเจรจาขอยกเลิกสิทธิสภาพนอกอาณาเขตกับชาติตะวันตก"], correct: 1, explanation: "การปฏิรูปการปกครองส่วนกลางใน พ.ศ. 2435 ทรงยกเลิกระบบจตุสดมภ์ (เวียง วัง คลัง นา) แตกแขนงออกเป็นกระทรวงระบบสากล 12 กระทรวง แบ่งแยกหน้าที่ตามความเชี่ยวชาญเฉพาะทาง" },
        { cat: "ประวัติศาสตร์", q: "การปฏิวัติการเปลี่ยนแปลงการปกครองของประเทศไทยเมื่อวันที่ 24 มิถุนายน พ.ศ. 2475 นำไปสู่ระบอบประชาธิปไตยอันมีพระมหากษัตริย์ทรงเป็นประมุข กระทำโดยกลุ่มบุคคลกลุ่มใด?", a: ["คณะราษฎร", "คณะ ร.ศ. 130", "ขบวนการเสรีไทย", "สมาคมกรรมกรสยาม"], correct: 0, explanation: "การเปลี่ยนแปลงการปกครอง พ.ศ. 2475 นำโดย 'คณะราษฎร' ซึ่งเป็นการรวมตัวกันของข้าราชการสายทหารบก ทหารเรือ และสายพลเรือน ปรับเปลี่ยนระบอบสมบูรณาญาสิทธิราชย์มาเป็นประชาธิปไตย" },
        { cat: "ประวัติศาสตร์", q: "อารยธรรมโบราณตะวันตกอารยธรรมใดที่ได้รับการยอมรับและยกย่องจากนักประวัติศาสตร์ว่าเป็น 'นครรัฐต้นกำเนิดของระบอบการปกครองประชาธิปไตย'?", a: ["อียิปต์โบราณ", "โรมันโบราณ (สาธารณรัฐโรม)", "อารยธรรมกรีกโบราณ (นครรัฐเอเธนส์)", "อารยธรรมเมโสโปเตเมีย (อาณาจักรบาบิโลน)"], correct: 2, explanation: "นครรัฐเอเธนส์ของอารยธรรมกรีกโบราณ ได้รับการยอมรับว่าเป็นต้นกำเนิดของประชาธิปไตย โดยเป็นระบบประชาธิปไตยโดยตรง (Direct Democracy) ที่พลเมืองชายมีสิทธิ์เข้าประชุมสภาและออกเสียง" },
        { cat: "ประวัติศาสตร์", q: "ผลงานทางประวัติศาสตร์ชิ้นสำคัญของพระเจ้าฮัมมูราบี แห่งบาบิโลเนีย (อารยธรรมเมโสโปเตเมีย) ที่สะท้อนการจัดระเบียบสังคมคืออะไร?", a: ["การสร้างพีระมิดขั้นบันไดเพื่อบูชาเทพเจ้า", "การประดิษฐ์อักษรรูปลิ่มหรือคูนิฟอร์มบนแผ่นดินเหนียว", "การตราประมวลกฎหมายที่เป็นลายลักษณ์อักษรที่ยึดหลักการโต้ตอบแบบ 'ตาต่อตา ฟันต่อฟัน'", "การคำนวณปฏิทินแบบสุริยคติที่แม่นยำ"], correct: 2, explanation: "ประมวลกฎหมายฮัมมูราบี (Code of Hammurabi) จารึกบนแท่งหินบาซอลต์ เป็นกฎหมายลายลักษณ์อักษรยุคแรกๆ สะท้อนการลงโทษที่เด็ดขาดรุนแรงตามหลัก 'An eye for an eye, a tooth for a tooth'" },
        { cat: "ประวัติศาสตร์", q: "โครงสร้างทางสังคมและการเมืองในยุโรปยุคกลางที่ผูกพันกันด้วยระบบสัญญาสวามิภักดิ์ระหว่างลอร์ด (Lord) และวาสซาล (Vassal) โดยมีที่ดินเป็นศูนย์กลางเรียกว่าระบบใด?", a: ["ระบบทุนนิยมอุตสาหกรรม", "ระบบสังคมนิยมแบบรัฐสวัสดิการ", "ระบบฟิวดัลหรือระบบศักดินาสวามิภักดิ์ (Feudalism)", "ระบบพาณิชยนิยมจักรวรรดิ"], correct: 2, explanation: "ระบบฟิวดัล (Feudalism) หรือระบบศักดินาสวามิภักดิ์ เป็นระบบครอบงำยุโรปยุคกลาง ยึดโยงด้วยความสัมพันธ์การกระจายอำนาจผ่านกรรมสิทธิ์ที่ดินและการปกป้องคุ้มครองซึ่งกันและกัน" },
        { cat: "ประวัติศาสตร์", q: "เหตุการณ์ในข้อใดที่เป็น 'ชนวนเหตุเฉพาะหน้า' สำคัญรุนแรงที่ลุกลามทำให้เกิดการประกาศสงครามโลกครั้งที่ 1 ในปี ค.ศ. 1914?", a: ["การลอบปลงพระชนม์อาร์ชดยุก ฟรานซ์ เฟอร์ดินานด์ มกุฎราชกุมารแห่งออสเตรีย-ฮังการี", "การบุกโจมตีสายฟ้าแลบเข้าสู่ดินแดนโปแลนด์ของกองทัพเยอรมนี", "การลอบโจมตีฐานทัพเรืออ่าวเพิร์ลฮาร์เบอร์โดยกองทัพญี่ปุ่น", "การเกิดการปฏิวัติรัสเซียของกลุ่มบอลเชวิค"], correct: 0, explanation: "ชนวนเหตุเฉพาะหน้าของสงครามโลกครั้งที่ 1 คือ การลอบปลงพระชนม์อาร์ชดยุก ฟรานซ์ เฟอร์ดินานด์ แห่งออสเตรีย ณ เมืองซาราเยโว โดยชาตินิยมเซอร์เบีย นำไปสู่การประกาศสงครามลูกโซ่ระหว่างพันธมิตร" },
        { cat: "ประวัติศาสตร์", q: "ช่วงเวลาแห่งความตึงเครียดทางการเมืองและทหารหลังสงครามโลกครั้งที่ 2 ที่เรียกว่า 'สงครามเย็น' (Cold War) เป็นการต่อสู้ทางอุดมการณ์ระหว่างขั้วอำนาจใด?", a: ["จักรวรรดิอังกฤษ กับ จักรวรรดิฝรั่งเศส", "สหรัฐอเมริกา (เสรีประชาธิปไตย) กับ สหภาพโซเวียต (คอมมิวนิสต์)", "นาซีเยอรมนี กับ สหภาพโซเวียต", "สาธารณรัฐประชาชนจีน กับ จักรวรรดิญี่ปุ่น"], correct: 1, explanation: "สงครามเย็นเป็นการแข่งขันด้านอุดมการณ์การเมืองและระบบเศรษฐกิจระหว่าง สหรัฐอเมริกา (ผู้นำโลกเสรี) กับ สหภาพโซเวียต (ผู้นำโลกคอมมิวนิสต์) โดยไม่มีการปะทะกันทางทหารโดยตรงระหว่างสองมหาอำนาจ" },
        { cat: "ประวัติศาสตร์", q: "บุคคลท่านใดที่เป็นผู้นำจิตวิญญาณในการขับเคลื่อนเรียกร้องเอกราชของประเทศอินเดียจากจักรวรรดิอังกฤษ โดยยึดหลักการ 'สัตยาเคราะห์' และ 'อหิงสา'?", a: ["มูฮัมหมัด อาลี จินนาห์", "เยาวหะราล เนห์รู", "มหาตมะ คานธี", "อินทิรา คานธี"], correct: 2, explanation: "มหาตมะ คานธี เป็นผู้นำการต่อสู้เรียกร้องเอกราชให้อินเดียโดยใช้หลัก 'อหิงสา' (ความไม่รุนแรง) และ 'สัตยาเคราะห์' (การยึดมั่นในความจริง/ดื้อแพ่งแพ่งโดยสงบ) เช่น การเดินขบวนเกลือ (Salt March)" },
        { cat: "ประวัติศาสตร์", q: "แนวคิดจิตวิญญาณสำคัญในยุค 'เรเนซองส์' (Renaissance) หรือยุคฟื้นฟูศิลปวิทยาการของยุโรป คือแนวคิดในข้อใดที่เปลี่ยนจากกรอบคิดเรื่องพระเจ้ามาสู่มนุษย์?", a: ["มนุษยนิยม (Humanism)", "คริสต์ศาสนนิยมแบบดั้งเดิม", "จักรวรรดินิยมเสรีนิยม", "ระบบพาณิชยนิยมอุตสาหกรรม"], correct: 0, explanation: "แนวคิดมนุษยนิยม (Humanism) ในยุคฟื้นฟูศิลปวิทยาการ มุ่งเน้นความเชื่อในศักยภาพ ความสามารถ และคุณค่าของมนุษย์ในโลกนี้ แทนที่จะยอมรับกฎเกณฑ์และกรอบของคริสตจักรในยุคกลางอย่างมืดบอด" },
        { cat: "ประวัติศาสตร์", q: "หากต้องการศึกษาข้อมูลทางประวัติศาสตร์ไทย ข้อใดต่อไปนี้จัดอยู่ในประเภทกลุ่ม 'หลักฐานชั้นต้น' (Primary Source) ที่มีความน่าเชื่อถือสูง?", a: ["หนังสือตำราเรียนประวัติศาสตร์ไทยของกระทรวงศึกษาธิการ", "วิทยานิพนธ์ระดับดุษฎีบัณฑิตเรื่องความสัมพันธ์ไทย-ฝรั่งเศส", "แผ่นศิลาจารึกสุโขทัยหลักที่ 1", "ภาพยนตร์หรือสารคดีโทรทัศน์ย้อนรอยอดีต"], correct: 2, explanation: "หลักฐานชั้นต้น (Primary Source) คือหลักฐานที่เกิดขึ้นในยุคเหตุการณ์นั้นจริง โดยผู้มีส่วนร่วมหรืออยู่ในเหตุการณ์ เช่น ศิลาจารึก จดหมายเหตุ หรือโบราณวัตถุ ส่วนหนังสือเรียนหรือวิทยานิพนธ์เป็นหลักฐานชั้นรอง" },

        // --- สาระที่ 5: ภูมิศาสตร์ (ข้อ 49-60) ---
        { cat: "ภูมิศาสตร์", q: "เทคโนโลยีภูมิสารสนเทศชนิดใดที่มีคุณลักษณะเด่นในการใช้ระบบคอมพิวเตอร์เพื่อจัดเก็บ ประมวลผล วิเคราะห์ และแสดงผลข้อมูลเชิงพื้นที่เชื่อมโยงกับฐานข้อมูล?", a: ["ระบบกำหนดตำแหน่งบนโลก (GPS)", "ระบบสารสนเทศภูมิศาสตร์ (GIS)", "ระบบการรับรู้จากระยะไกล (Remote Sensing)", "แผนที่แสดงลักษณะภูมิประเทศ"], correct: 1, explanation: "GIS (Geographic Information System) หรือระบบสารสนเทศภูมิศาสตร์ คือการใช้คอมพิวเตอร์วิเคราะห์ข้อมูลพื้นที่เชิงซ้อนเป็นชั้นๆ (Layers) ต่างจาก GPS ที่เน้นหาพิกัดตำแหน่ง และ RS ที่เน้นการถ่ายภาพจากระยะไกล" },
        { cat: "ภูมิศาสตร์", q: "โครงสร้างภูมิประเทศส่วนใหญ่ของภูมิภาค 'ตะวันออกเฉียงเหนือ' ของประเทศไทย มีลักษณะโดดเด่นเฉพาะแบบใดตามโครงสร้างทางธรณีวิทยา?", a: ["ที่ราบลุ่มแม่น้ำขนาดใหญ่ที่น้ำท่วมถึงสลับเนินเขา", "ที่ราบชายฝั่งทะเลแนวยาวสลับป่าชายเลน", "ที่ราบสูงรูปแอ่งกระทะขนาบด้วยทิวเขา (แอ่งโคราชและแอ่งสกลนคร)", "ภูเขาสูงชันสลับหุบเขาลึกรูปตัววี (V-shaped valley)"], correct: 2, explanation: "ภาคอีสานเป็นที่ราบสูงหินทราย โดยมีลักษณะลาดเอียงเป็นรูปแอ่งกระทะ 2 แอ่งใหญ่ ได้แก่ แอ่งโคราช (ทางตอนล่าง) และแอ่งสกลนคร (ทางตอนบน) ถูกกั้นด้วยทิวเขาภูพาน" },

    let currentQuizSet = []; 
    let currentQuestionIndex = 0;
    let totalScore = 0;
    let savedUserAnswers = []; 
    let selectedGameMode = 60;

    function shuffleArray(originalArray) {
        let cloned = JSON.parse(JSON.stringify(originalArray));
        for (let i = cloned.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
        }
        return cloned;
    }

        const highScore = localStorage.getItem('tcas_high_score') || '-';
        const lastScore = localStorage.getItem('tcas_last_score') || '-';
        const attempts = localStorage.getItem('tcas_attempts_count') || '0';

        document.getElementById("app").innerHTML = `

                    </div>

                    <button type="button" class="btn-mode" onclick="prepareQuiz(20)">🎯 โหมดสุ่มแนวข้อสอบ 20 ข้อ</button>
                    <button type="button" class="btn-mode" onclick="prepareQuiz(40)">⚡ โหมดสุ่มแนวข้อสอบ 40 ข้อ</button>
                    <button type="button" class="btn-mode" onclick="prepareQuiz(60)">🔥 โหมดจัดเต็ม ครบ 60 ข้อ (แนะนำ)</button>

            </div>
        `;

    function prepareQuiz(modeCount) {
        selectedGameMode = modeCount;
        currentQuestionIndex = 0;
        totalScore = 0;
        savedUserAnswers = [];

        let shuffledQuestions = shuffleArray(MASTER_QUIZ);
        let selectedQuestions = shuffledQuestions.slice(0, modeCount);

        currentQuizSet = selectedQuestions.map((item) => {
            let originalChoices = [...item.a];
            let correctText = originalChoices[item.correct];
            
            let shuffledChoices = shuffleArray(originalChoices);
            let newCorrectIndex = shuffledChoices.indexOf(correctText);

            return {
                cat: item.cat,
                q: item.q,
                a: shuffledChoices,
                correct: newCorrectIndex,
                explanation: item.explanation
            };
        });

        let currentAttempts = parseInt(localStorage.getItem('tcas_attempts_count') || '0');
        localStorage.setItem('tcas_attempts_count', currentAttempts + 1);

        renderQuestionScreen();
    }

    function renderQuestionScreen() {
        const currentData = currentQuizSet[currentQuestionIndex];
        const progressPercent = ((currentQuestionIndex + 1) / currentQuizSet.length) * 100;

        const renderChoicesHtml = currentData.a.map((choice, index) => 
            `<button type="button" onclick="evaluateUserSelection(${index}, this)">${index + 1}. ${choice}</button>`
        ).join("");

        document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="info-text">สาระ${currentData.cat} | ข้อที่ ${currentQuestionIndex + 1} จาก ${currentQuizSet.length}</div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: ${progressPercent}%"></div>
                </div>
                <h2>${currentData.q}</h2>
                <div style="text-align: left;">
                    ${renderChoicesHtml}
                </div>
            </div>
        `;
    }

    function evaluateUserSelection(selectedIndex, clickedButtonElement) {
        const currentData = currentQuizSet[currentQuestionIndex];
        const allButtonsInDom = document.querySelectorAll("#app button");

        savedUserAnswers[currentQuestionIndex] = selectedIndex;
        allButtonsInDom.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentData.correct) {
            totalScore++;
            clickedButtonElement.classList.add("correct");
        } else {
            clickedButtonElement.classList.add("wrong");
            allButtonsInDom[currentData.correct].classList.add("correct");
        }

        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuizSet.length) {
                renderQuestionScreen();
            } else {
                renderScoreResultScreen();
            }
        }, 550);
    }

    function renderScoreResultScreen() {
        const finalCalculatedPercent = ((totalScore / currentQuizSet.length) * 100).toFixed(1);
        
        localStorage.setItem('tcas_last_score', `${totalScore}/${currentQuizSet.length}`);
        
        let existingHighScore = localStorage.getItem('tcas_high_score_raw');
        if (!existingHighScore || totalScore > parseInt(existingHighScore)) {
            localStorage.setItem('tcas_high_score_raw', totalScore);
            localStorage.setItem('tcas_high_score', `${totalScore}/${currentQuizSet.length} (${finalCalculatedPercent}%)`);
        }

        let categoryStats = { "ศาสนา": { correct: 0, total: 0 }, "หน้าที่พลเมือง": { correct: 0, total: 0 }, "เศรษฐศาสตร์": { correct: 0, total: 0 }, "ประวัติศาสตร์": { correct: 0, total: 0 }, "ภูมิศาสตร์": { correct: 0, total: 0 } };
        
        currentQuizSet.forEach((item, index) => {
            if(categoryStats[item.cat]) {
                categoryStats[item.cat].total++;
                if(savedUserAnswers[index] === item.correct) {
                    categoryStats[item.cat].correct++;
                }
            }
        });

        let analysisCommentary = "";
        if(finalCalculatedPercent >= 80) analysisCommentary = "🔥 ยอดเยี่ยมระดับเกียรตินิยม! ความรู้แข็งแกร่งพร้อมลุยสนามสอบจริงแล้วครับ";
        else if(finalCalculatedPercent >= 60) analysisCommentary = "👍 ทำได้ดีผ่านมาตรฐาน! เจาะอ่านบทที่พลาดเพิ่มอีกนิดเพื่ออัปเกรดคะแนนให้สูงขึ้น";
        else if(finalCalculatedPercent >= 40) analysisCommentary = "📚 พอใช้ได้ครับ แต่ยังมีจุดโหว่ค่อนข้างเยอะ แนะนำให้ไปรีวิวข้อย้อนหลังเพื่อเช็คบทเรียน";
        else analysisCommentary = "✍️ พยายามต่อไปครับ! แนะนำให้กลับไปทบทวนสรุปเนื้อหาแกนหลัก แล้วกลับมาฝึกซ้ำอีกรอบนะ";

        let categoriesHtml = "";
        for (const [title, stat] of Object.entries(categoryStats)) {
            if(stat.total > 0) {
                categoriesHtml += `
                    <div class="category-row">
                        <span>สาระ${title}</span>
                        <strong>${stat.correct} / ${stat.total} ข้อ</strong>
                    </div>
                `;
            }
        }

        document.getElementById("app").innerHTML = `
            <div class="card-result fade-in">
                <h1>🎉 สรุปผลคะแนนของคุณ</h1>
                <div class="score-box">
                    <div class="score-circle">
                        <span class="raw">${totalScore}</span>
                        <span class="label">เต็ม ${currentQuizSet.length}</span>
                    </div>
                    <div class="percent-text">${finalCalculatedPercent}%</div>
                    <p style="color:#e2e8f0; font-size:1rem; margin-bottom:0;">${analysisCommentary}</p>
                </div>

                <div class="category-container">
                    <div class="category-title">📊 สถิติวิเคราะห์รายสาระวิชา</div>
                    ${categoriesHtml}
                </div>

                <button type="button" class="btn-center" onclick="renderReviewAnalysisScreen()">🔍 ดูคำอธิบายเฉลยและข้อที่ผิด</button>
                <button type="button" class="btn-secondary" onclick="initApp()">🔙 กลับไปหน้าหลัก</button>
            </div>
        `;
    }

    function renderReviewAnalysisScreen() {
        let reviewListHtml = "";

        currentQuizSet.forEach((questionItem, index) => {
            let userSelectedChoice = savedUserAnswers[index];
            let isUserCorrect = userSelectedChoice === questionItem.correct;
            let currentItemBorderColor = isUserCorrect ? "border-left-color: #10b981;" : "border-left-color: #ef4444;";

            let choiceItemsHtml = questionItem.a.map((choiceText, cIndex) => {
                let statusCssClass = 'r-normal';
                let stateBadgeHtml = '';

                if (cIndex === questionItem.correct) {
                    statusCssClass = 'r-correct';
                    stateBadgeHtml = `<span class="badge" style="background:#10b981; color:white;">คำตอบที่ถูกต้อง</span>`;
                } else if (cIndex === userSelectedChoice && !isUserCorrect) {
                    statusCssClass = 'r-wrong';
                    stateBadgeHtml = `<span class="badge" style="background:#ef4444; color:white;">คุณตอบข้อนี้</span>`;
                }

                return `<div class="review-choice ${statusCssClass}">${cIndex + 1}. ${choiceText} ${stateBadgeHtml}</div>`;
            }).join("");

            reviewListHtml += `
                <div class="review-item" style="${currentItemBorderColor}">
                    <h4>ข้อ ${index + 1} [สาระ${questionItem.cat}]: ${questionItem.q}</h4>
                    ${choiceItemsHtml}
                    <div class="explanation-box">
                        <strong>💡 คำอธิบายเฉลย:</strong> ${questionItem.explanation}
                    </div>
                </div>
            `;
        });

        document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <h1>📝 ตรวจสอบและทบทวนข้อสอบ</h1>
                <p>วิเคราะห์คำอธิบายเฉลยเพื่อปิดจุดบกพร่องทางความรู้</p>
                <div class="review-container">
                    ${reviewListHtml}
                </div>
                <button type="button" class="btn-center" onclick="renderScoreResultScreen()">🔙 กลับไปหน้าคะแนน</button>
                <button type="button" class="btn-secondary" onclick="initApp()">🔄 กลับหน้าหลัก / เริ่มใหม่</button>
            </div>
        `;
    }

    window.onload = initApp;
</script>

</body>
</html>
