<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCAS Social AI - A-Level สังคมศึกษา 60 ข้อ</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* รีเซ็ตและตั้งค่าธีมหลัก (Modern Dark Mode) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card {
            background: #1e293b; padding: 40px 30px; border-radius: 24px; max-width: 700px; width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155; transition: all 0.3s ease; text-align: center;
        }

        h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 10px; font-weight: 700; }
        h2 { font-size: 1.3rem; color: #e2e8f0; margin-bottom: 25px; line-height: 1.5; font-weight: 600; text-align: left; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; }

        .progress-container { width: 100%; background-color: #334155; border-radius: 9999px; height: 8px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #06b6d4); height: 100%; width: 0%; transition: width 0.4s ease; }
        .info-text { font-size: 0.95rem; color: #38bdf8; margin-bottom: 10px; text-transform: uppercase; font-weight: 600; text-align: left; }

        button {
            background: #2563eb; color: #ffffff; padding: 16px 24px; border: none; border-radius: 14px;
            font-size: 1.05rem; font-weight: 600; margin: 10px 0; cursor: pointer; width: 100%;
            transition: all 0.2s ease; text-align: left; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        button:active:not(:disabled) { transform: translateY(0); }
        
        .btn-center { text-align: center; background: linear-gradient(135deg, #3b82f6, #2563eb); margin-top: 15px; }
        .btn-secondary { background: #475569; text-align: center; }
        .btn-secondary:hover:not(:disabled) { background: #334155; }

        button.correct { background-color: #10b981 !important; color: white; border: 1px solid #059669; }
        button.wrong { background-color: #ef4444 !important; color: white; border: 1px solid #dc2626; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        /* ผลคะแนน */
        .score-box { background: #334155; border-radius: 16px; padding: 25px; margin: 20px 0; border: 2px solid #475569; }
        .score-circle {
            width: 120px; height: 120px; border-radius: 50%; background: #0f172a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin: 0 auto 15px; border: 4px solid #38bdf8;
        }
        .score-circle span.raw { font-size: 2.2rem; font-weight: bold; color: #38bdf8; line-height: 1; }
        .score-circle span.label { font-size: 0.9rem; color: #94a3b8; margin-top: 5px; }
        .percent-text { font-size: 1.8rem; color: #10b981; font-weight: bold; margin-bottom: 10px; }

        /* ระบบตรวจสอบคำตอบ (Review) */
        .review-container {
            max-height: 500px; overflow-y: auto; text-align: left; margin-top: 20px; padding-right: 10px;
        }
        .review-container::-webkit-scrollbar { width: 8px; }
        .review-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .review-item { background: #293548; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #475569; }
        .review-item h4 { color: #f8fafc; margin-bottom: 12px; font-size: 1.1rem; line-height: 1.5; }
        .review-choice { padding: 10px 15px; border-radius: 8px; margin-bottom: 6px; font-size: 0.95rem; display: flex; align-items: center; }
        
        .r-correct { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #10b981; font-weight: 600; }
        .r-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; }
        .r-normal { background: #334155; color: #94a3b8; }
        .badge { margin-left: auto; font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="card" id="app">
    <h1>🏛 TCAS Social AI</h1>
    <p>แบบทดสอบจำลอง A-Level สังคมศึกษา (60 ข้อ)<br>ครอบคลุม 5 สาระวิชา ตาม Blueprint ล่าสุด</p>
    <button class="btn-center" onclick="startQuiz()">เริ่มทำข้อสอบ</button>
</div>

<script>
    let questionIndex = 0;
    let score = 0;
    let userAnswers = []; // เก็บคำตอบของผู้ใช้

    // คลังข้อสอบ 60 ข้อ (5 สาระ สาระละ 12 ข้อ)
    const quiz = [
        // --- ศาสนา ศีลธรรม จริยธรรม (ข้อ 1-12) ---
        { q: "หลักธรรมในข้อใดของพระพุทธศาสนา ที่มีกระบวนการสอดคล้องกับ 'วิธีทางวิทยาศาสตร์' มากที่สุด?", a: ["อริยสัจ 4", "พรหมวิหาร 4", "อิทธิบาท 4", "สังคหวัตถุ 4"], correct: 0 },
        { q: "ผู้บริหารที่มอบหมายงานให้ลูกน้องตามความสามารถ และให้ผลตอบแทนที่เป็นธรรม สอดคล้องกับหลักธรรมใด?", a: ["อคติ 4", "อิทธิบาท 4", "พรหมวิหาร 4", "สังคหวัตถุ 4"], correct: 2 },
        { q: "การทำสมาธิแบบ 'วิปัสสนากรรมฐาน' มีจุดมุ่งหมายสูงสุดเพื่อสิ่งใด?", a: ["เพื่อให้จิตสงบปราศจากนิวรณ์", "เพื่อให้เกิดฤทธิ์และอภิญญา", "เพื่อให้เกิดปัญญาเห็นแจ้งในไตรลักษณ์", "เพื่อให้จิตแน่วแน่เป็นสมาธิระดับฌาน"], correct: 2 },
        { q: "ศาสนาใดจัดเป็นศาสนาประเภท 'อเทวนิยม' (ไม่มีความเชื่อเรื่องพระเจ้าผู้สร้างโลก)?", a: ["คริสต์ และ อิสลาม", "พราหมณ์-ฮินดู และ สิกข์", "พุทธ และ เชน", "ยูดาห์ และ คริสต์"], correct: 2 },
        { q: "หลักปฏิบัติข้อใดของมุสลิมที่ 'บังคับเฉพาะผู้ที่มีความพร้อม' ทางร่างกายและทรัพย์สินเท่านั้น?", a: ["การละหมาด", "การถือศีลอด", "การบริจาคซะกาต", "การประกอบพิธีฮัจญ์"], correct: 3 },
        { q: "คัมภีร์ใดของศาสนาพราหมณ์-ฮินดู ที่เก่าแก่และสำคัญที่สุด?", a: ["สามเวท", "อาถรรพเวท", "ฤคเวท", "ยชุรเวท"], correct: 2 },
        { q: "วันสำคัญทางพระพุทธศาสนาวันใด ที่มีเหตุการณ์ 'จาตุรงคสันนิบาต' เกิดขึ้น?", a: ["วันวิสาขบูชา", "วันอาสาฬหบูชา", "วันมาฆบูชา", "วันอัฏฐมีบูชา"], correct: 2 },
        { q: "ความเชื่อในเรื่อง 'บาปกำเนิด' (Original Sin) เป็นหลักคำสอนที่สำคัญของศาสนาใด?", a: ["ศาสนาพุทธ", "ศาสนาคริสต์", "ศาสนาอิสลาม", "ศาสนาพราหมณ์-ฮินดู"], correct: 1 },
        { q: "หลักธรรม 'ปฏิจจสมุปบาท' สอนให้เข้าใจถึงเรื่องใดเป็นสำคัญ?", a: ["ความเป็นเหตุเป็นผลที่เกี่ยวเนื่องกัน", "การเวียนว่ายตายเกิดในสังสารวัฏ", "การปฏิบัติตนเพื่อความหลุดพ้น", "การทำดีได้ดี ทำชั่วได้ชั่ว"], correct: 0 },
        { q: "นิกายมหายานในพระพุทธศาสนา มีจุดเด่นในเรื่องใดที่แตกต่างจากนิกายเถรวาทชัดเจนที่สุด?", a: ["การนับถือพระธรรมวินัยอย่างเคร่งครัด", "อุดมคติพระโพธิสัตว์ที่เน้นช่วยเหลือสรรพสัตว์", "การมุ่งเน้นการทำสมาธิเพื่อให้บรรลุอรหันต์", "การไม่เชื่อเรื่องกฎแห่งกรรม"], correct: 1 },
        { q: "การที่นักเรียนตั้งใจอ่านหนังสือเพื่อสอบเข้ามหาวิทยาลัยให้ได้ตามที่หวัง ตรงกับหลักธรรมข้อใดในอิทธิบาท 4?", a: ["ฉันทะ", "วิริยะ", "จิตตะ", "วิมังสา"], correct: 2 }, // จิตตะ = เอาใจฝักใฝ่
        { q: "คริสต์ศาสนานิกายใดที่ไม่มีนักบวช (บาทหลวง) แต่มีศาสนาจารย์เป็นผู้นำพิธีกรรม?", a: ["โรมันคาทอลิก", "ออร์โธดอกซ์", "โปรเตสแตนต์", "แองกลิกัน"], correct: 2 },

        // --- หน้าที่พลเมือง (ข้อ 13-24) ---
        { q: "กฎหมายในข้อใดจัดอยู่ในประเภท 'กฎหมายมหาชน'?", a: ["ประมวลกฎหมายแพ่งและพาณิชย์", "กฎหมายว่าด้วยลิขสิทธิ์", "รัฐธรรมนูญแห่งราชอาณาจักรไทย", "กฎหมายว่าด้วยเช็คและตั๋วเงิน"], correct: 2 },
        { q: "การสมรสจะสมบูรณ์ตามกฎหมายเมื่อใด?", a: ["เมื่อจัดพิธีแต่งงานตามประเพณี", "เมื่อจดทะเบียนสมรสต่อหน้าเจ้าพนักงาน", "เมื่อชายหญิงอยู่กินด้วยกันเกิน 1 ปี", "เมื่อบิดามารดาทั้งสองฝ่ายยินยอม"], correct: 1 },
        { q: "การกระทำความผิดอาญาในข้อใด ที่ถือเป็น 'ความผิดอันยอมความได้'?", a: ["ความผิดฐานฆ่าคนตาย", "ความผิดฐานยักยอกทรัพย์", "ความผิดฐานชิงทรัพย์", "ความผิดฐานปล้นทรัพย์"], correct: 1 },
        { q: "องค์กรใดตามรัฐธรรมนูญที่มีหน้าที่ตรวจสอบการทุจริตของเจ้าหน้าที่รัฐ?", a: ["ศาลปกครอง", "ผู้ตรวจการแผ่นดิน", "คณะกรรมการ ป.ป.ช.", "ศาลรัฐธรรมนูญ"], correct: 2 },
        { q: "ข้อใดคือลักษณะสำคัญของระบอบเผด็จการเบ็ดเสร็จ (Totalitarianism)?", a: ["ประชาชนมีเสรีภาพทางเศรษฐกิจ แต่ไม่มีเสรีภาพทางการเมือง", "รัฐควบคุมทุกด้านของชีวิตประชาชน ทั้งการเมือง เศรษฐกิจ สังคม", "อำนาจอธิปไตยเป็นของประชาชน แต่บริหารโดยผู้นำทหาร", "ผู้นำมาจากสายเลือดและสืบทอดทางสายโลหิต"], correct: 1 },
        { q: "สถาบันทางสังคมใดที่มีบทบาทสำคัญที่สุดในการ 'ขัดเกลาทางสังคมขั้นปฐมภูมิ'?", a: ["สถาบันการศึกษา", "สถาบันศาสนา", "สถาบันสื่อสารมวลชน", "สถาบันครอบครัว"], correct: 3 },
        { q: "รูปแบบการปกครองส่วนท้องถิ่นรูปแบบพิเศษของประเทศไทยในปัจจุบัน ได้แก่ข้อใด?", a: ["เทศบาล และ อบต.", "กรุงเทพมหานคร และ เมืองพัทยา", "อบจ. และ เทศบาลเมือง", "กรุงเทพมหานคร และ ภูเก็ต"], correct: 1 },
        { q: "ข้อใดคือองค์ประกอบของ 'รัฐ' ตามหลักรัฐศาสตร์ที่ถูกต้องและครบถ้วนที่สุด?", a: ["ประชากร, ดินแดน, รัฐบาล, รัฐธรรมนูญ", "ประชากร, ดินแดน, รัฐบาล, อำนาจอธิปไตย", "ประชากร, เมืองหลวง, รัฐบาล, กองทัพ", "ประชากร, ดินแดน, อำนาจอธิปไตย, เศรษฐกิจ"], correct: 1 },
        { q: "วัฒนธรรมประเภทใดที่จับต้องไม่ได้ แต่มีผลต่อการจัดระเบียบสังคม เช่น กฎหมาย มารยาท?", a: ["วัตถุธรรม (Material Culture)", "คติธรรม (Moral Culture)", "เนติธรรม (Legal Culture)", "สหธรรม (Social Culture)"], correct: 2 },
        { q: "การละเมิดลิขสิทธิ์ภาพยนตร์หรือเพลง ถือเป็นการทำผิดกฎหมายประเภทใด?", a: ["กฎหมายอาญา", "กฎหมายแพ่ง", "กฎหมายทรัพย์สินทางปัญญา", "กฎหมายพาณิชย์"], correct: 2 },
        { q: "ในระบอบประชาธิปไตยแบบรัฐสภา หากสภาผู้แทนราษฎรลงมติ 'ไม่ไว้วางใจ' นายกรัฐมนตรี จะเกิดผลอย่างไร?", a: ["นายกรัฐมนตรีต้องพ้นจากตำแหน่ง", "ต้องจัดการเลือกตั้งใหม่ภายใน 60 วัน", "ประธานรัฐสภาขึ้นรักษาการแทน", "ศาลรัฐธรรมนูญต้องเข้ามาวินิจฉัย"], correct: 0 },
        { q: "ปฏิญญาสากลว่าด้วยสิทธิมนุษยชนแห่งสหประชาชาติ (UDHR) ให้ความสำคัญกับสิ่งใดมากที่สุด?", a: ["การรักษาความมั่นคงของรัฐ", "ความเท่าเทียมทางเศรษฐกิจของทุกคน", "ศักดิ์ศรีความเป็นมนุษย์และสิทธิขั้นพื้นฐาน", "การจัดระเบียบการค้าระหว่างประเทศ"], correct: 2 },

        // --- เศรษฐศาสตร์ (ข้อ 25-36) ---
        { q: "ปัญหาพื้นฐานทางเศรษฐศาสตร์ (What, How, For whom) เกิดขึ้นจากสาเหตุใดเป็นสำคัญ?", a: ["การกระจายรายได้ที่ไม่เท่าเทียมกัน", "ความต้องการมีไม่จำกัด แต่ทรัพยากรมีจำกัด", "การแทรกแซงของรัฐบาลในระบบเศรษฐกิจ", "จำนวนประชากรที่เพิ่มขึ้นอย่างรวดเร็ว"], correct: 1 },
        { q: "ตลาดประเภทใดที่มีผู้ขายเพียงไม่กี่ราย และสินค้ามักสามารถใช้ทดแทนกันได้ดี?", a: ["ตลาดแข่งขันสมบูรณ์", "ตลาดผูกขาด", "ตลาดผู้ขายน้อยราย", "ตลาดกึ่งแข่งขันกึ่งผูกขาด"], correct: 2 },
        { q: "ตาม 'กฎของอุปสงค์' (Law of Demand) เมื่อราคาสินค้าเพิ่มขึ้น จะเกิดผลอย่างไร?", a: ["ความต้องการซื้อสินค้าจะลดลง", "ความต้องการซื้อสินค้าจะเพิ่มขึ้น", "ความต้องการขายสินค้าจะลดลง", "อุปทานของสินค้าจะเพิ่มขึ้น"], correct: 0 },

    function startQuiz() {
        questionIndex = 0;
        score = 0;
        userAnswers = [];
        showQuestion();
    }

    function showQuestion() {
        const currentQuiz = quiz[questionIndex];
        const progressPercent = ((questionIndex) / quiz.length) * 100;

        const choicesHtml = currentQuiz.a.map((choice, index) => 
            `<button onclick="submitAnswer(${index}, this)">${index + 1}. ${choice}</button>`
        ).join("");

        document.getElementById("app").innerHTML = `
            <div class="info-text">ข้อที่ ${questionIndex + 1} จาก ${quiz.length}</div>
            <div class="progress-container">
                <div class="progress-bar" style="width: ${progressPercent}%"></div>
            </div>
            <h2>${currentQuiz.q}</h2>
            <div style="text-align: left;">
                ${choicesHtml}
            </div>
        `;
    }

    function submitAnswer(selectedIndex, selectedButton) {
        const currentQuiz = quiz[questionIndex];
        const allButtons = document.querySelectorAll("#app button");

        // บันทึกคำตอบของผู้ใช้
        userAnswers[questionIndex] = selectedIndex;
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuiz.correct) {
            score++;
            selectedButton.classList.add("correct");
        } else {
            selectedButton.classList.add("wrong");
            allButtons[currentQuiz.correct].classList.add("correct");
        }

        setTimeout(() => {
            questionIndex++;
            if (questionIndex < quiz.length) {
                showQuestion();
            } else {
                showResult();
            }
        }, 1000); 
    }

    function showResult() {
        const finalPercent = ((score / quiz.length) * 100).toFixed(0);
        let evaluationText = "";

        if(finalPercent >= 80) evaluationText = "🔥 สุดยอดมาก! ความรู้แน่นระดับเทพ พร้อมสอบ A-Level แล้ว!";
        else if(finalPercent >= 50) evaluationText = "👍 ทำได้ดีครับ ผ่านเกณฑ์พื้นฐาน แต่ถ้าทบทวนอีกนิดคะแนนพุ่งแน่นอน!";
        else evaluationText = "📚 ไม่เป็นไรนะ! ถือเป็นการเช็คจุดอ่อน แนะนำให้อ่านเนื้อหาเพิ่มและมาแก้มือใหม่";

        document.getElementById("app").innerHTML = `
            <h1>🎉 สรุปผลคะแนนของคุณ</h1>
            <div class="score-box">
                <div class="score-circle">
                    <span class="raw">${score}</span>
                    <span class="label">เต็ม ${quiz.length}</span>
                </div>
                <div class="percent-text">${finalPercent}%</div>
                <p style="margin-bottom:0; color:#e2e8f0;">${evaluationText}</p>
            </div>
            <button class="btn-center" onclick="showReview()">🔍 ดูเฉลยและข้อที่ผิด</button>
            <button class="btn-secondary" onclick="startQuiz()">🔄 ทำแบบทดสอบอีกครั้ง</button>
        `;
    }

    function showReview() {
        let html = `
            <h1>📝 ตรวจสอบคำตอบ</h1>
            <p>มาดูว่าคุณตอบข้อไหนถูกและผิดไปบ้าง</p>
            <div class="review-container">
        `;

        quiz.forEach((q, i) => {
            let uAns = userAnswers[i];
            let isCorrect = uAns === q.correct;
            let borderStyle = isCorrect ? "border-left-color: #10b981;" : "border-left-color: #ef4444;";

            html += `<div class="review-item" style="${borderStyle}">
                        <h4>ข้อ ${i + 1}: ${q.q}</h4>`;
            
            q.a.forEach((choice, cIndex) => {
                let cssClass = 'r-normal';
                let badge = '';

                if (cIndex === q.correct) {
                    cssClass = 'r-correct';
                    badge = `<span class="badge" style="background:#10b981; color:white;">คำตอบที่ถูกต้อง</span>`;
                } else if (cIndex === uAns && uAns !== q.correct) {
                    cssClass = 'r-wrong';
                    badge = `<span class="badge" style="background:#ef4444; color:white;">คุณตอบข้อนี้</span>`;
                }

                html += `<div class="review-choice ${cssClass}">${cIndex + 1}. ${choice} ${badge}</div>`;
            });
            html += `</div>`;
        });

        html += `</div>
            <button class="btn-center" onclick="showResult()">🔙 กลับไปหน้าคะแนน</button>
            <button class="btn-secondary" onclick="startQuiz()">🔄 ทำแบบทดสอบอีกครั้ง</button>
        `;

        document.getElementById("app").innerHTML = html;
    }
</script>

</body>
</html>
