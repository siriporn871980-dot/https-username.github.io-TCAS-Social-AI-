<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCAS Social AI - คลังข้อสอบจำลอง A-Level สังคมศึกษา</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card {
            background: #1e293b; padding: 30px; border-radius: 24px; max-width: 750px; width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155; transition: all 0.3s ease; text-align: center; position: relative;
        }

        h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 10px; font-weight: 700; }
        h2 { font-size: 1.25rem; color: #e2e8f0; margin-bottom: 20px; line-height: 1.5; font-weight: 600; text-align: left; }
        p { color: #94a3b8; font-size: 1.05rem; margin-bottom: 25px; }

        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #131c2e; padding: 10px 15px; border-radius: 12px; border: 1px solid #334155; }
        .timer-box { font-size: 1.1rem; font-weight: 700; color: #f59e0b; display: flex; align-items: center; gap: 5px; }
        .timer-warn { color: #ef4444; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .fade-in { animation: fadeInEffect 0.35s ease-out forwards; }
        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-container { width: 100%; background-color: #334155; border-radius: 9999px; height: 6px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #06b6d4); height: 100%; width: 0%; transition: width 0.3s ease; }
        .info-text { font-size: 0.9rem; color: #38bdf8; font-weight: 600; text-transform: uppercase; }

        .choice-btn {
            background: #334155; color: #ffffff; padding: 14px 20px; border: 1px solid #475569; border-radius: 12px;
            font-size: 1rem; font-weight: 500; margin: 8px 0; cursor: pointer; width: 100%;
            transition: all 0.2s ease; text-align: left;
        }
        .choice-btn:hover { background: #475569; transform: translateY(-1px); }
        .choice-btn.selected { background: #2563eb; border-color: #3b82f6; font-weight: 600; }

        .nav-actions { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.95rem; text-align: center; transition: all 0.2s; }
        .btn-prev { background: #475569; color: white; }
        .btn-skip { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
        .btn-next-action { background: #0284c7; color: white; }
        .btn-submit-exam { background: #10b981; color: white; }
        .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .grid-title { text-align: left; font-size: 0.9rem; color: #94a3b8; margin: 20px 0 8px; font-weight: 600; }
        .num-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-start; margin-bottom: 10px; max-height: 95px; overflow-y: auto; padding: 2px; }
        .grid-item { width: 32px; height: 32px; border-radius: 6px; background: #334155; color: #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
        .grid-item:hover { background: #475569; color: white; }
        .grid-item.current { border: 2px solid #38bdf8; color: #38bdf8; }
        .grid-item.answered { background: #1e3a8a; color: #38bdf8; border-color: #2563eb; }
        .grid-item.skipped { background: #78350f; color: #f59e0b; }

        .btn-center { text-align: center; background: linear-gradient(135deg, #3b82f6, #2563eb); margin-top: 15px; padding: 14px; width: 100%; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: #475569; text-align: center; margin-top: 10px; padding: 14px; width: 100%; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        .btn-mode { background: #334155; border: 1px solid #475569; text-align: center; margin: 6px 0; padding: 14px; width: 100%; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        .btn-mode:hover { background: #475569; }

        .score-box { background: #334155; border-radius: 16px; padding: 25px; margin: 20px 0; border: 2px solid #475569; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 15px; border: 4px solid #38bdf8; }
        .score-circle span.raw { font-size: 2.2rem; font-weight: bold; color: #38bdf8; line-height: 1; }
        .score-circle span.label { font-size: 0.9rem; color: #94a3b8; margin-top: 5px; }
        .percent-text { font-size: 1.8rem; color: #10b981; font-weight: bold; margin-bottom: 10px; }

        .category-container { text-align: left; background: #1e293b; border-radius: 12px; padding: 15px; margin: 15px 0; border: 1px solid #334155; }
        .category-title { font-size: 1.05rem; font-weight: bold; color: #38bdf8; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .category-row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 0.95rem; color: #e2e8f0; }

        .stats-dashboard { display: flex; justify-content: space-around; background: #131c2e; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #1e293b; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: #38bdf8; }
        .stat-lbl { font-size: 0.8rem; color: #94a3b8; margin-top: 3px; }

        .review-container { max-height: 420px; overflow-y: auto; text-align: left; margin-top: 20px; padding-right: 10px; }
        .review-container::-webkit-scrollbar { width: 6px; }
        .review-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .review-item { background: #293548; padding: 18px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #475569; }
        .review-item h4 { color: #f8fafc; margin-bottom: 12px; font-size: 1.05rem; line-height: 1.5; }
        .review-choice { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 0.95rem; display: flex; align-items: center; }
        
        .r-correct { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981; font-weight: 600; }
        .r-wrong { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; }
        .r-normal { background: #334155; color: #cbd5e1; }
        .badge { margin-left: auto; font-size: 0.75rem; padding: 2px 6px; border-radius: 8px; }
        .explanation-box { margin-top: 10px; padding: 10px; background: #1e293b; border-radius: 8px; border-left: 3px solid #38bdf8; font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; }

        /* Login & Leaderboard Styles */
        .login-input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; text-align: center; }
        .login-input:focus { outline: none; border-color: #38bdf8; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; border-bottom: 1px solid #334155; }
        .leaderboard-table th { color: #38bdf8; font-weight: bold; }
        .rank-1 { color: #fbbf24; font-weight: bold; }
        .rank-2 { color: #94a3b8; font-weight: bold; }
        .rank-3 { color: #b45309; font-weight: bold; }
        .user-header { display: flex; justify-content: space-between; align-items: center; background: #131c2e; padding: 10px 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="card" id="app"></div>

<script>
    // ------------------- ส่วนของฐานข้อมูลข้อสอบ -------------------
    const MASTER_QUIZ = [
        { cat: "ศาสนา", q: "หลักธรรมในข้อใดของพระพุทธศาสนา ที่มีกระบวนการและทัศนคติสอดคล้องกับ 'วิธีการทางวิทยาศาสตร์' มากที่สุด?", a: ["อริยสัจ 4", "พรหมวิหาร 4", "อิทธิบาท 4", "สังคหวัตถุ 4"], correct: 0, explanation: "อริยสัจ 4 มีกระบวนการแก้ปัญหาจากเหตุไปหาผล ซึ่งตรงกับวิธีการทางวิทยาศาสตร์ที่สุด" },
        { cat: "หน้าที่พลเมือง", q: "กฎหมายในข้อใดจัดอยู่ในกลุ่มประเภท 'กฎหมายมหาชน' (Public Law) ซึ่งจัดวางความสัมพันธ์ระหว่างรัฐกับเอกชน?", a: ["ประมวลกฎหมายแพ่งและพาณิชย์", "กฎหมายลิขสิทธิ์และสิทธิบัตร", "รัฐธรรมนูญและกฎหมายอาญา", "กฎหมายว่าด้วยตั๋วเงินและหุ้นส่วน"], correct: 2, explanation: "กฎหมายมหาชน คือกฎหมายที่กำหนดความสัมพันธ์ระหว่างรัฐกับประชาชน เช่น รัฐธรรมนูญ กฎหมายอาญา" },
        { cat: "เศรษฐศาสตร์", q: "ปัญหาพื้นฐานทางเศรษฐศาสตร์ (What, How, For whom) เกิดขึ้นจากสภาวการณ์ใดในโลกแห่งความเป็นจริง?", a: ["ระบบการกระจายรายได้และโอกาสที่ไม่เท่าเทียมกันของประชากร", "ความต้องการของมนุษย์มีไม่จำกัด แต่ทรัพยากรทางเศรษฐกิจมีอยู่จำกัด", "การที่รัฐบาลเข้ามาควบคุมและแทรกแซงราคาตลาดจนกลไกราคาล้มเหลว", "การเปลี่ยนแปลงของระดับราคาสินค้าเนื่องจากอัตราเงินเฟ้อ"], correct: 1, explanation: "ปัญหาพื้นฐานทางเศรษฐศาสตร์เกิดจากความขัดแย้งระหว่าง 'ความต้องการที่มีไม่จำกัด' กับ 'ความขาดแคลนของทรัพยากร'" },
        { cat: "ประวัติศาสตร์", q: "ในขั้นตอนของ 'วิธีการทางประวัติศาสตร์' ขั้นตอนใดที่ถือเป็นจุดเริ่มแรกสุดเพื่อกำหนดกรอบและขอบเขตของการศึกษาค้นคว้าข้อมูล?", a: ["การรวบรวมหลักฐานทางประวัติศาสตร์", "การประเมินความน่าเชื่อถือของหลักฐาน (การวิพากษ์วิธี)", "การกำหนดหัวข้อหรือประเด็นปัญหาที่ต้องการศึกษา", "การวิเคราะห์และตีความข้อมูล"], correct: 2, explanation: "ขั้นตอนแรกสุดของวิธีการทางประวัติศาสตร์คือ การตั้งประเด็นปัญหาหรือกำหนดหัวข้อที่ต้องการศึกษา" },
        { cat: "ภูมิศาสตร์", q: "เทคโนโลยีภูมิสารสนเทศชนิดใดที่มีคุณลักษณะเด่นในการใช้ระบบคอมพิวเตอร์เพื่อจัดเก็บ ประมวลผล วิเคราะห์ และแสดงผลข้อมูลเชิงพื้นที่เชื่อมโยงกับฐานข้อมูล?", a: ["ระบบกำหนดตำแหน่งบนโลก (GPS)", "ระบบสารสนเทศภูมิศาสตร์ (GIS)", "ระบบการรับรู้จากระยะไกล (Remote Sensing)", "แผนที่แสดงลักษณะภูมิประเทศ"], correct: 1, explanation: "GIS (Geographic Information System) คือการใช้คอมพิวเตอร์วิเคราะห์ข้อมูลพื้นที่เชิงซ้อนเป็นชั้นๆ" }
        // หมายเหตุ: ตัดข้อสอบบางส่วนออกเพื่อให้โค้ดกระชับ คุณสามารถนำ MASTER_QUIZ 60 ข้อเดิมมาวางแทนที่ตรงนี้ได้เลยครับ
    ];

    let currentQuizSet = []; 
    let currentQuestionIndex = 0;
    let savedUserAnswers = []; 
    let selectedGameMode = 5; // เปลี่ยนให้ตรงกับจำนวนข้อที่ตั้งไว้
    let timeRemaining = 0; 
    let timerIntervalId = null;

    // ระบบ Authentication จำลอง
    let currentUser = localStorage.getItem('tcas_current_user');

    function shuffleArray(originalArray) {
        let cloned = JSON.parse(JSON.stringify(originalArray));
        for (let i = cloned.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
        }
        return cloned;
    }

    // ------------------- ระบบ Login -------------------
    function renderLoginScreen() {
        document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <h1>🔐 เข้าสู่ระบบ</h1>
                <p>กรุณากรอกชื่อของคุณเพื่อบันทึกคะแนนลงใน Leaderboard</p>
                <input type="text" id="usernameInput" class="login-input" placeholder="พิมพ์ชื่อของคุณที่นี่..." autocomplete="off">
                <button type="button" class="btn-center" onclick="handleLogin()">เข้าสู่ระบบ / เริ่มทำข้อสอบ</button>
            </div>
        `;
    }

    function handleLogin() {
        const name = document.getElementById("usernameInput").value.trim();
        if (name === "") {
            alert("กรุณากรอกชื่อของคุณก่อนเข้าสู่ระบบครับ");
            return;
        }
        currentUser = name;
        localStorage.setItem('tcas_current_user', currentUser);
        initApp();
    }

    function handleLogout() {
        currentUser = null;
        localStorage.removeItem('tcas_current_user');
        renderLoginScreen();
    }

    // ------------------- หน้าจอเมนูหลัก -------------------
    function initApp() {
        if (!currentUser) {
            renderLoginScreen();
            return;
        }

        if(timerIntervalId) clearInterval(timerIntervalId);
        
        // ดึงสถิติส่วนตัว
        const userStats = JSON.parse(localStorage.getItem(`tcas_stats_${currentUser}`)) || {
            highScore: '-',
            lastScore: '-',
            attempts: 0
        };

        document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="user-header">
                    <span style="font-weight:bold; color:#38bdf8;">👤 ยินดีต้อนรับ, ${currentUser}</span>
                    <button class="logout-btn" onclick="handleLogout()">ออกจากระบบ</button>
                </div>

                <h1>🏛 TCAS Social AI</h1>
                <p>ระบบคลังข้อสอบจำลองและประเมินผล A-Level วิชาสังคมศึกษา</p>
                
                <div class="stats-dashboard">
                    <div class="stat-item">
                        <span class="stat-val">${userStats.highScore}</span>
                        <span class="stat-lbl">คะแนนสูงสุด</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val">${userStats.lastScore}</span>
                        <span class="stat-lbl">ล่าสุด</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val">${userStats.attempts}</span>
                        <span class="stat-lbl">จำนวนครั้งที่ทำ</span>
                    </div>
                </div>

                <div style="margin-bottom: 25px;">
                    <p style="font-size: 0.95rem; font-weight: bold; color: #38bdf8; margin-bottom: 10px; text-align: left;">เลือกโหมดการทดสอบ:</p>
                    <button type="button" class="btn-mode" onclick="prepareQuiz(5)">🎯 โหมดสุ่มแนวข้อสอบ 5 ข้อ (Demo)</button>
                    </div>
                
                <button type="button" class="btn-secondary" onclick="renderLeaderboardScreen()">🏆 ดูกระดานผู้นำ (Leaderboard)</button>
            </div>
        `;
    }

    // ------------------- ระบบสอบ (คล้ายของเดิม) -------------------
    function prepareQuiz(modeCount) {
        // เผื่อกรณีเลือกจำนวนข้อมากกว่าข้อสอบที่มี
        modeCount = Math.min(modeCount, MASTER_QUIZ.length); 
        selectedGameMode = modeCount;
        currentQuestionIndex = 0;
        savedUserAnswers = new Array(modeCount).fill(null);

        timeRemaining = modeCount * 1.5 * 60; // คำนวณเวลาคร่าวๆ ข้อละ 1.5 นาที

        let shuffledQuestions = shuffleArray(MASTER_QUIZ);
        let selectedQuestions = shuffledQuestions.slice(0, modeCount);

        currentQuizSet = selectedQuestions.map((item) => {
            let originalChoices = [...item.a];
            let correctText = originalChoices[item.correct];
            let shuffledChoices = shuffleArray(originalChoices);
            let newCorrectIndex = shuffledChoices.indexOf(correctText);

            return {
                cat: item.cat,
                q: item.q,
                a: shuffledChoices,
                correct: newCorrectIndex,
                explanation: item.explanation
            };
        });

        startExamTimer();
        renderQuestionScreen();
    }

    function startExamTimer() {
        if(timerIntervalId) clearInterval(timerIntervalId);
        timerIntervalId = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            
            if(timeRemaining <= 0) {
                clearInterval(timerIntervalId);
                alert("⏳ หมดเวลาทำข้อสอบแล้ว!");
                renderScoreResultScreen();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerElement = document.getElementById("timer-display");
        if (!timerElement) return;
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        timerElement.innerHTML = `⏱️ เวลาที่เหลือ: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        if (timeRemaining <= 300) timerElement.classList.add("timer-warn");
        else timerElement.classList.remove("timer-warn");
    }

    function renderQuestionScreen() {
        const currentData = currentQuizSet[currentQuestionIndex];
        const progressPercent = ((currentQuestionIndex + 1) / currentQuizSet.length) * 100;
        const userAnswer = savedUserAnswers[currentQuestionIndex];

        const renderChoicesHtml = currentData.a.map((choice, index) => {
            let isSelectedClass = (userAnswer === index) ? "selected" : "";
            return `<button type="button" class="choice-btn ${isSelectedClass}" onclick="storeAnswer(${index})">${index + 1}. ${choice}</button>`;
        }).join("");

        let gridHtml = "";
        currentQuizSet.forEach((item, idx) => {
            let statusClass = "";
            if (idx === currentQuestionIndex) statusClass = "current";
            else if (savedUserAnswers[idx] !== null && savedUserAnswers[idx] !== -1) statusClass = "answered";
            else if (savedUserAnswers[idx] === -1) statusClass = "skipped";

            gridHtml += `<div class="grid-item ${statusClass}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>`;
        });

        document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <div class="header-meta">
                    <div class="info-text">สาระ${currentData.cat} | ข้อที่ ${currentQuestionIndex + 1}/${currentQuizSet.length}</div>
                    <div id="timer-display" class="timer-box">⏱️ เวลาที่เหลือ: --:--</div>
                </div>
                <div class="progress-container"><div class="progress-bar" style="width: ${progressPercent}%"></div></div>
                <h2>${currentData.q}</h2>
                <div style="text-align: left; margin-bottom: 10px;">${renderChoicesHtml}</div>
                <div class="nav-actions">
                    <button type="button" class="action-btn btn-prev" onclick="navigateQuestion(-1)" ${currentQuestionIndex === 0 ? 'disabled style="opacity:0.4;"' : ''}>⬅ ข้อก่อนหน้า</button>
                    <button type="button" class="action-btn btn-skip" onclick="skipCurrentQuestion()">🔖 ข้ามข้อนี้ไปก่อน</button>
                    ${currentQuestionIndex === currentQuizSet.length - 1 
                        ? `<button type="button" class="action-btn btn-submit-exam" onclick="confirmFinishExam()">📥 ส่งข้อสอบ</button>`
                        : `<button type="button" class="action-btn btn-next-action" onclick="navigateQuestion(1)">ข้อถัดไป ➡</button>`
                    }
                </div>
                <div class="grid-title">📌 แผงผังสถานะข้อสอบ (กดสลับข้อได้อิสระ)</div>
                <div class="num-grid">${gridHtml}</div>
            </div>
        `;
        updateTimerDisplay();
    }

    function storeAnswer(choiceIndex) {
        savedUserAnswers[currentQuestionIndex] = choiceIndex;
        renderQuestionScreen(); 
    }

    function skipCurrentQuestion() {
        if (savedUserAnswers[currentQuestionIndex] === null) savedUserAnswers[currentQuestionIndex] = -1; 
        if (currentQuestionIndex < currentQuizSet.length - 1) {
            currentQuestionIndex++;
            renderQuestionScreen();
        }
    }

    function navigateQuestion(direction) {
        let targetIndex = currentQuestionIndex + direction;
        if (targetIndex >= 0 && targetIndex < currentQuizSet.length) {
            currentQuestionIndex = targetIndex;
            renderQuestionScreen();
        }
    }

    function jumpToQuestion(targetIndex) {
        currentQuestionIndex = targetIndex;
        renderQuestionScreen();
    }

    function confirmFinishExam() {
        let unansweredCount = savedUserAnswers.filter(ans => ans === null || ans === -1).length;
        if(unansweredCount > 0) {
            if(!confirm(`⚠️ คุณยังไม่ได้ตอบอีก ${unansweredCount} ข้อ ยืนยันที่จะส่งข้อสอบเลยหรือไม่ครับ?`)) return;
        } else {
            if(!confirm("ยืนยันการส่งกระดาษคำตอบและสิ้นสุดการทดสอบ?")) return;
        }
        renderScoreResultScreen();
    }

    // ------------------- ระบบบันทึกผล & Leaderboard -------------------
    function renderScoreResultScreen() {
        if(timerIntervalId) clearInterval(timerIntervalId);

        let totalScore = 0;
        currentQuizSet.forEach((item, index) => {
            if (savedUserAnswers[index] === item.correct) totalScore++;
        });

        const finalCalculatedPercent = ((totalScore / currentQuizSet.length) * 100).toFixed(1);
        
        // 1. บันทึกสถิติส่วนตัว
        let userStats = JSON.parse(localStorage.getItem(`tcas_stats_${currentUser}`)) || { highScoreRaw: 0, attempts: 0 };
        userStats.attempts += 1;
        userStats.lastScore = `${totalScore}/${currentQuizSet.length}`;
        
        if (totalScore > userStats.highScoreRaw) {
            userStats.highScoreRaw = totalScore;
            userStats.highScore = `${totalScore}/${currentQuizSet.length} (${finalCalculatedPercent}%)`;
        }
        localStorage.setItem(`tcas_stats_${currentUser}`, JSON.stringify(userStats));

        // 2. บันทึกลงกระดานผู้นำรวม (Leaderboard)
        let leaderboard = JSON.parse(localStorage.getItem('tcas_leaderboard')) || [];
        leaderboard.push({
            name: currentUser,
            score: totalScore,
            total: currentQuizSet.length,
            percent: parseFloat(finalCalculatedPercent),
            date: new Date().toLocaleDateString('th-TH')
        });
        localStorage.setItem('tcas_leaderboard', JSON.stringify(leaderboard));

        document.getElementById("app").innerHTML = `
            <div class="card-result fade-in">
                <h1>🎉 สรุปผลคะแนนของคุณ</h1>
                <div class="score-box">
                    <div class="score-circle">
                        <span class="raw">${totalScore}</span>
                        <span class="label">เต็ม ${currentQuizSet.length}</span>
                    </div>
                    <div class="percent-text">${finalCalculatedPercent}%</div>
                </div>
                <button type="button" class="btn-center" onclick="renderLeaderboardScreen()">🏆 ดู Leaderboard</button>
                <button type="button" class="btn-secondary" onclick="initApp()">🔙 กลับไปหน้าหลัก</button>
            </div>
        `;
    }

    function renderLeaderboardScreen() {
        let leaderboard = JSON.parse(localStorage.getItem('tcas_leaderboard')) || [];
        
        // กรองเฉพาะคะแนนสูงสุดของแต่ละคน (คนเดียวสอบหลายครั้ง ให้เอาครั้งที่ดีที่สุดมาโชว์)
        let highestScores = {};
        leaderboard.forEach(entry => {
            if (!highestScores[entry.name] || entry.percent > highestScores[entry.name].percent) {
                highestScores[entry.name] = entry;
            }
        });

        // แปลงกลับเป็น Array และเรียงลำดับคะแนนจากมากไปน้อย
        let sortedLeaderboard = Object.values(highestScores).sort((a, b) => b.percent - a.percent);

        let tableRows = sortedLeaderboard.map((entry, index) => {
            let rankClass = index === 0 ? 'rank-1' : (index === 1 ? 'rank-2' : (index === 2 ? 'rank-3' : ''));
            let medal = index === 0 ? '🥇' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : (index + 1)));
            return `
                <tr>
                    <td class="${rankClass}" style="text-align:center;">${medal}</td>
                    <td>${entry.name}</td>
                    <td style="text-align:right;">${entry.percent}%</td>
                </tr>
            `;
        }).join("");

        if (tableRows === "") {
            tableRows = `<tr><td colspan="3" style="text-align:center; color:#94a3b8;">ยังไม่มีข้อมูลในระบบ</td></tr>`;
        }

        document.getElementById("app").innerHTML = `
            <div class="fade-in">
                <h1>🏆 กระดานผู้นำสูงสุด</h1>
                <p>ทำเนียบผู้ที่ทำคะแนน A-Level สังคมศึกษาได้ดีที่สุด</p>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th style="text-align:center; width: 60px;">อันดับ</th>
                            <th>ชื่อผู้สอบ</th>
                            <th style="text-align:right;">คะแนน (%)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
                <button type="button" class="btn-center" onclick="initApp()">🔙 กลับเมนูหลัก</button>
            </div>
        `;
    }

    // เริ่มการทำงานของระบบ
    window.onload = initApp;
</script>

</body>
</html>
