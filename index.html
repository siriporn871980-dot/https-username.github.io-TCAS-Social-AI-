<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCAS Social AI</title>

<style>

body{
background:#111827;
font-family:Arial;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1f2937;
padding:30px;
border-radius:20px;
max-width:600px;
margin:auto;
}

button{
background:#3b82f6;
color:white;
padding:15px 30px;
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="card">

<h1>🏛 TCAS Social AI</h1>

<h2>ยินดีต้อนรับ</h2>

<p>
เว็บติว A-Level สังคม
</p>

<button onclick="startQuiz()">
เริ่มทำข้อสอบ
</button>

</div>

<script>
function startQuiz(){

document.querySelector(".card").innerHTML = `

<h1>📚 ข้อสอบ A-Level สังคม</h1>

<p>ข้อ 1. ข้อใดเป็นหน้าที่ของรัฐธรรมนูญ</p>

<button onclick="checkAnswer(1)">ก. กำหนดสิทธิและหน้าที่ของประชาชน</button>
<br><br>

<button onclick="checkAnswer(0)">ข. กำหนดราคาสินค้าทุกชนิด</button>
<br><br>

<button onclick="checkAnswer(0)">ค. ยกเลิกการเลือกตั้ง</button>
<br><br>

<button onclick="checkAnswer(0)">ง. ควบคุมความคิดประชาชน</button>

`;

}


function checkAnswer(score){

if(score==1){

document.querySelector(".card").innerHTML = `
<h1>✅ ถูกต้อง!</h1>
<p>รัฐธรรมนูญเป็นกฎหมายสูงสุดที่กำหนดโครงสร้างรัฐ สิทธิ และหน้าที่ของประชาชน</p>
<button onclick="location.reload()">กลับหน้าหลัก</button>
`;

}

else{

document.querySelector(".card").innerHTML = `
<h1>❌ ผิด</h1>
<p>ลองทบทวนเรื่องรัฐธรรมนูญอีกครั้ง</p>
<button onclick="location.reload()">กลับหน้าหลัก</button>
`;

}

</script>

</body>

</html>
