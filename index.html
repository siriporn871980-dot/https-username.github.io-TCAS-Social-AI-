<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCAS Social AI - Platform (60 Questions)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================= ตกแต่งหน้าเว็บ (CSS) ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; padding: 20px; line-height: 1.6; }
        .card { background: #1e293b; padding: 30px; border-radius: 24px; max-width: 800px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1, h2, h3 { color: #f1f5f9; margin-bottom: 15px; text-align: center; }
        
        /* Input & Button */
        .input-box { width: 100%; padding: 14px; margin: 10px 0 20px 0; border-radius: 12px; border: 1px solid #475569; background: #334155; color: white; font-size: 16px; font-family: 'Sarabun', sans-serif; }
        .btn { background: #e11d48; color: white; padding: 14px; border: none; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.2s; font-family: 'Sarabun', sans-serif; }
        .btn:hover { background: #be123c; }
        
        /* Quiz UI */
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #38bdf8; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #334155; border: 2px solid #475569; border-radius: 12px; color: white; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; font-family: 'Sarabun', sans-serif; }
        .choice-btn:hover { background: #475569; }
        .choice-btn.selected { border-color: #38bdf8; background: #0369a1; }
        
        /* Summary & Leaderboard */
        .score-display { text-align: center; font-size: 28px; font-weight: bold; color: #10b981; margin: 20px 0; padding: 20px; background: #064e3b; border-radius: 16px; }
        .review-box { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #475569; }
        .review-box.correct { border-left-color: #10b981; }
        .review-box.wrong { border-left-color: #e11d48; }
        .explanation { color: #94a3b8; font-size: 14px; margin-top: 10px; background: #1e293b; padding: 10px; border-radius: 8px; border-left: 3px solid #38bdf8;}
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; color: white; margin-bottom: 30px; }
        th, td { padding: 12px; border-bottom: 1px solid #475569; text-align: center; }
        th { background: #334155; color: #38bdf8; }
    </style>
</head>
<body>

<div class="card" id="app">
    </div>

<script>
    /* ================= 1. คลังข้อสอบ 60 ข้อ ================= */
    const MASTER_QUIZ = [
        // --- ศาสนา ศีลธรรม จริยธรรม ---
        { cat: "ศาสนา", q: "หลักธรรมในข้อใดของพระพุทธศาสนา ที่มีกระบวนการและทัศนคติสอดคล้องกับ 'วิธีการทางวิทยาศาสตร์' มากที่สุด?", a: ["อริยสัจ 4", "พรหมวิหาร 4", "อิทธิบาท 4", "สังคหวัตถุ 4"], correct: 0, explanation: "อริยสัจ 4 มีกระบวนการแก้ปัญหาจากเหตุไปหาผล ซึ่งตรงกับวิธีการทางวิทยาศาสตร์ที่สุด" },
        { cat: "ศาสนา", q: "ผู้พิพากษาที่ทำหน้าที่ตัดสินคดีความอย่างซื่อสัตย์สุจริต สอดคล้องกับการปฏิบัติตามหลักพรหมวิหาร 4 ในข้อใดชัดเจนที่สุด?", a: ["เมตตา", "กรุณา", "มุทิตา", "อุเบกขา"], correct: 3, explanation: "อุเบกขา คือการวางใจเป็นกลางอย่างเที่ยงธรรมตามหลักกฎเกณฑ์ความถูกต้อง" },
        { cat: "ศาสนา", q: "การเจริญภาวนาแบบ 'วิปัสสนากรรมฐาน' ในทางพระพุทธศาสนามีจุดมุ่งหมายสูงสุดเพื่อสิ่งใด?", a: ["เพื่อให้จิตสงบระงับจากกิเลสและนิวรณ์ชั่วคราว", "เพื่อให้เกิดอภิญญาและหยั่งรู้อนาคตเพื่อละกิเลส", "เพื่อให้เกิดปัญญาญาณเห็นแจ้งในไตรลักษณ์จนสิ้นอาสวะ", "เพื่อให้จิตแน่วแน่เป็นสมาธิระดับฌานสมาบัติ"], correct: 2, explanation: "วิปัสสนากรรมฐาน มุ่งเน้นการใช้ปัญญาพิจารณาสภาวะธรรมจนเห็นแจ้งใน 'ไตรลักษณ์' เพื่อตัดกิเลส" },
        { cat: "ศาสนา", q: "ศาสนาในข้อใดจัดอยู่ในกลุ่มประเภท 'อเทวนิยม' (ไม่มีความเชื่อเรื่องพระเจ้า)?", a: ["ศาสนาคริสต์ และ ศาสนาอิสลาม", "ศาสนาพราหมณ์-ฮินดู และ ศาสนาสิกข์", "ศาสนาพุทธ และ ศาสนาเชน", "ศาสนายูดาห์ และ ศาสนาคริสต์"], correct: 2, explanation: "ศาสนาพุทธ และศาสนาเชน เป็นศาสนาประเภทอเทวนิยม ปฏิเสธการมีอยู่ของพระเจ้าผู้สร้างโลก" },
        { cat: "ศาสนา", q: "หลักปฏิบัติข้อใดของชาวมุสลิมตามหลักการอิสลาม ที่บัญญัติให้ปฏิบัติบังคับ 'เฉพาะผู้ที่มีความพร้อม' เป็นสำคัญ?", a: ["การละหมาด", "การถือศีลอด", "การบริจาคซะกาต", "การประกอบพิธีฮัจญ์"], correct: 3, explanation: "การประกอบพิธีฮัจญ์ ถูกบัญญัติให้เป็นหน้าที่เฉพาะผู้ที่มีความพร้อมด้านกำลังทรัพย์และสุขภาพ" },
        { cat: "ศาสนา", q: "คัมภีร์ใดในระบบวรรณกรรมพระเวทของศาสนาพราหมณ์-ฮินดู ที่ได้รับการยอมรับว่าเก่าแก่ที่สุด?", a: ["คัมภีร์สามเวท", "คัมภีร์อาถรรพเวท", "คัมภีร์ฤคเวท", "คัมภีร์ยชุรเวท"], correct: 2, explanation: "คัมภีร์ฤคเวท เป็นคัมภีร์ที่เก่าแก่ที่สุดในบรรดาสังหิตาทั้ง 4 ของพระเวท" },
        { cat: "ศาสนา", q: "วันสำคัญทางพระพุทธศาสนาวันใดที่มีเหตุการณ์มหัศจรรย์ 'จาตุรงคสันนิบาต'?", a: ["วันวิสาขบูชา", "วันอาสาฬหบูชา", "วันมาฆบูชา", "วันอัฏฐมีบูชา"], correct: 2, explanation: "วันมาฆบูชา เกิดเหตุการณ์จาตุรงคสันนิบาต พระสงฆ์ 1,250 รูปมาประชุมกันโดยมิได้นัดหมาย" },
        { cat: "ศาสนา", q: "แนวคิดความเชื่อเรื่อง 'บาปกำเนิด' (Original Sin) ถือเป็นแกนหลักคำสอนที่สำคัญของศาสนาใด?", a: ["ศาสนาพุทธ", "ศาสนาคริสต์", "ศาสนาอิสลาม", "ศาสนาพราหมณ์-ฮินดู"], correct: 1, explanation: "ศาสนาคริสต์สอนเรื่องบาปกำเนิด ซึ่งเป็นบาปที่ติดตัวมนุษย์ทุกคนมาตั้งแต่เกิด" },
        { cat: "ศาสนา", q: "หลักธรรมคำสอนเรื่อง 'ปฏิจจสมุปบาท' ในพระพุทธศาสนา มุ่งเน้นสอนให้มนุษย์ทำความเข้าใจเกี่ยวกับเรื่องใด?", a: ["ความเป็นเหตุเป็นผลของสิ่งทั้งหลายที่พึ่งพาเกี่ยวเนื่องกันเกิดขึ้น", "การเวียนว่ายตายเกิดในสังสารวัฏของจิตวิญญาณ", "แนวทางการปฏิบัติตนตามทางสายกลาง", "การจำแนกกรรมและผลของกรรม"], correct: 0, explanation: "ปฏิจจสมุปบาท คือ หลักธรรมที่ว่าด้วยสิ่งทั้งหลายอาศัยกันและกันจึงเกิดขึ้น เป็นกฎแห่งเหตุและผลทางธรรมชาติ" },
        { cat: "ศาสนา", q: "นิกายมหายานในพระพุทธศาสนา มีอุดมคติและจุดเด่นหลักในข้อใดที่แตกต่างจากนิกายเถรวาท?", a: ["การรักษาพระธรรมวินัยเดิมดั้งเดิมไว้อย่างเคร่งครัด", "การมุ่งเน้นอุดมคติพระโพธิสัตว์เพื่อช่วยเหลือสรรพสัตว์", "การปฏิเสธการทำสมาธิขั้นสูง", "การไม่เชื่อในเรื่องการหลุดพ้น"], correct: 1, explanation: "นิกายมหายานเน้น 'อุดมคติพระโพธิสัตว์' คือการบำเพ็ญบารมีเพื่อช่วยรื้อขนสรรพสัตว์ให้พ้นทุกข์" },
        { cat: "ศาสนา", q: "การที่นักเรียนจดจ่อ มีสมาธิแน่วแน่ ไม่ปล่อยปละละเลยต่อการทบทวนตำราเรียน สอดคล้องกับหลักธรรมข้อใดในอิทธิบาท 4?", a: ["ฉันทะ", "วิริยะ", "จิตตะ", "วิมังสา"], correct: 2, explanation: "จิตตะ ในอิทธิบาท 4 คือ ความตั้งจิตรับรู้ เอาใจฝักใฝ่ มีสมาธิจดจ่ออยู่กับสิ่งที่ทำ" },
        { cat: "ศาสนา", q: "คริสต์ศาสนานิกายใดที่มีโครงสร้างการบริหารที่ปฏิเสธอำนาจสูงสุดของพระสันตะปาปา และมีศาสนาจารย์เป็นผู้นำ?", a: ["โรมันคาทอลิก", "ออร์โธดอกซ์", "โปรเตสแตนต์", "แองกลิกัน"], correct: 2, explanation: "นิกายโปรเตสแตนต์ ปฏิเสธอำนาจของพระสันตะปาปา ไม่มีคณะนักบวช (บาทหลวง) แต่มีศาสนาจารย์" },

        // --- หน้าที่พลเมือง ---
        { cat: "หน้าที่พลเมือง", q: "กฎหมายในข้อใดจัดอยู่ในกลุ่มประเภท 'กฎหมายมหาชน' (Public Law)?", a: ["ประมวลกฎหมายแพ่งและพาณิชย์", "กฎหมายลิขสิทธิ์และสิทธิบัตร", "รัฐธรรมนูญและกฎหมายอาญา", "กฎหมายว่าด้วยตั๋วเงินและหุ้นส่วน"], correct: 2, explanation: "กฎหมายมหาชน คือกฎหมายที่กำหนดความสัมพันธ์ระหว่างรัฐกับประชาชน เช่น รัฐธรรมนูญ กฎหมายอาญา" },
        { cat: "หน้าที่พลเมือง", q: "การสมรสในประเทศไทยจะมีความสมบูรณ์ตามกฎหมายเมื่อใด?", a: ["เมื่อมีการจัดพิธีแต่งงาน", "เมื่อได้ทำการจดทะเบียนสมรสต่อนายทะเบียน", "เมื่ออยู่กินฉันสามีภรรยาเปิดเผยเกิน 1 ปี", "เมื่อบิดามารดาทั้งสองฝ่ายลงนามรับทราบ"], correct: 1, explanation: "การสมรสตามกฎหมายไทยจะมีผลสมบูรณ์ก็ต่อเมื่อได้ทำการ 'จดทะเบียนสมรส' เท่านั้น" },
        { cat: "หน้าที่พลเมือง", q: "การกระทำความผิดทางอาญาในข้อใด ที่กฎหมายบัญญัติให้เป็น 'ความผิดอันยอมความได้'?", a: ["ความผิดฐานฆ่าผู้อื่นโดยเจตนา", "ความผิดฐานยักยอกทรัพย์หรือฉ้อโกงทรัพย์", "ความผิดฐานชิงทรัพย์โดยมีอาวุธ", "ความผิดฐานปล้นทรัพย์"], correct: 1, explanation: "ความผิดฐานยักยอกและฉ้อโกงทรัพย์เป็นความผิดต่อส่วนตัวที่ยอมความกันได้ตามกฎหมาย" },
        { cat: "หน้าที่พลเมือง", q: "องค์กรอิสระใดมีหน้าที่หลักในการตรวจสอบและไต่สวนการทุจริตประพฤติมิชอบของเจ้าหน้าที่รัฐ?", a: ["ศาลปกครองสูงสุด", "ผู้ตรวจการแผ่นดิน", "คณะกรรมการ ป.ป.ช.", "ศาลรัฐธรรมนูญ"], correct: 2, explanation: "คณะกรรมการ ป.ป.ช. มีหน้าที่หลักในการตรวจสอบทรัพย์สิน และไต่สวนข้อเท็จจริงกรณีทุจริต" },
        { cat: "หน้าที่พลเมือง", q: "ข้อใดคือลักษณะเด่นที่เป็นแกนหลักของระบอบการปกครองแบบ 'เผด็จการเบ็ดเสร็จ'?", a: ["ประชาชนมีเสรีภาพทางเศรษฐกิจอย่างเต็มที่", "รัฐเข้าควบคุมและจัดระเบียบทุกด้านของวิถีชีวิตประชากร", "อำนาจอธิปไตยแบ่งแยกชัดเจน", "การสืบทอดอำนาจผ่านสายโลหิต"], correct: 1, explanation: "ระบอบเผด็จการเบ็ดเสร็จ รัฐจะเข้าควบคุมชีวิตของประชาชนทุกมิติ เพื่ออุดมการณ์ของรัฐบาล" },
        { cat: "หน้าที่พลเมือง", q: "สถาบันทางสังคมใดทำหน้าที่ 'ขัดเกลาทางสังคมขั้นปฐมภูมิ' แก่มนุษย์?", a: ["สถาบันการศึกษา", "สถาบันศาสนา", "สถาบันสื่อสารมวลชน", "สถาบันครอบครัว"], correct: 3, explanation: "สถาบันครอบครัวเป็นสถาบันแรกสุดที่ทำหน้าที่ขัดเกลาทางสังคม คอยอบรมสั่งสอนพื้นฐานแก่สมาชิก" },
        { cat: "หน้าที่พลเมือง", q: "โครงสร้างการปกครองส่วนท้องถิ่นรูปแบบพิเศษของประเทศไทย ประกอบด้วยหน่วยงานใดบ้าง?", a: ["เทศบาลนคร และ อบต.", "กรุงเทพมหานคร และ เมืองพัทยา", "อบจ. และ เทศบาลเมือง", "กรุงเทพมหานคร และ จังหวัดภูเก็ต"], correct: 1, explanation: "ประเทศไทยมีการจัดระเบียบบริหารราชการส่วนท้องถิ่นรูปแบบพิเศษอยู่ 2 แห่ง คือ กรุงเทพมหานคร (กทม.) และ เมืองพัทยา" },
        { cat: "หน้าที่พลเมือง", q: "ตามหลักรัฐศาสตร์สากล ข้อใดคือองค์ประกอบของ 'รัฐ' ที่ถูกต้อง?", a: ["ประชากร, ดินแดน, รัฐบาล, รัฐธรรมนูญ", "ประชากร, ดินแดน, รัฐบาล, อำนาจอธิปไตย", "ประชากร, เมืองหลวง, รัฐบาล, กองทัพ", "ประชากร, ดินแดน, อำนาจอธิปไตย, เสรีภาพ"], correct: 1, explanation: "องค์ประกอบของรัฐประกอบด้วย 1. ประชากร 2. ดินแดน 3. รัฐบาล และ 4. อำนาจอธิปไตย" },
        { cat: "หน้าที่พลเมือง", q: "วัฒนธรรมในข้อใดจัดอยู่ในประเภท 'เนติธรรม' (Legal Culture)?", a: ["สิ่งปลูกสร้าง โบราณสถาน", "หลักธรรมทางศาสนาและความซื่อสัตย์", "ประมวลกฎหมาย กฎระเบียบข้อบังคับ", "มารยาททางสังคม การแต่งกาย"], correct: 2, explanation: "เนติธรรม คือ วัฒนธรรมทางกฎหมาย รวมถึงระเบียบข้อบังคับที่มีบทลงโทษชัดเจน" },
        { cat: "หน้าที่พลเมือง", q: "การดาวน์โหลดโปรแกรมคอมพิวเตอร์หรือภาพยนตร์ที่มีลิขสิทธิ์มาใช้งานโดยไม่ได้รับอนุญาต ละเมิดกฎหมายใด?", a: ["กฎหมายลักษณะอาญาแผ่นดิน", "กฎหมายลักษณะแพ่ง", "กฎหมายทรัพย์สินทางปัญญา", "กฎหมายพาณิชย์"], correct: 2, explanation: "การละเมิดผลงานสร้างสรรค์ จัดเป็นการละเมิด 'กฎหมายทรัพย์สินทางปัญญา' (เช่น กฎหมายลิขสิทธิ์)" },
        { cat: "หน้าที่พลเมือง", q: "ในระบบรัฐสภา หากสภาผู้แทนราษฎรมีมติ 'ไม่ไว้วางใจ' นายกรัฐมนตรี จะส่งผลอย่างไร?", a: ["นายกรัฐมนตรีและคณะรัฐมนตรีต้องพ้นจากตำแหน่งทั้งคณะ", "ประธานสภาต้องประกาศยุบสภาทันที", "ประธานรัฐสภาจะรักษาการแทน", "ส่งให้ศาลรัฐธรรมนูญวินิจฉัย"], correct: 0, explanation: "หากสภาลงมติไม่ไว้วางใจ นายกรัฐมนตรีและคณะรัฐมนตรีต้องพ้นจากตำแหน่งทั้งคณะทันที" },
        { cat: "หน้าที่พลเมือง", q: "เอกสารระหว่างประเทศฉบับใดที่เป็นมาตรฐานสากลในการคุ้มครองศักดิ์ศรีของมนุษย์หลังสงครามโลกครั้งที่ 2?", a: ["สนธิสัญญาแวร์ซายส์", "กติการะหว่างประเทศว่าด้วยสิทธิพลเมือง", "ปฏิญญาสากลว่าด้วยสิทธิมนุษยชน (UDHR)", "อนุสัญญาเจนีวา"], correct: 2, explanation: "ปฏิญญาสากลว่าด้วยสิทธิมนุษยชน (UDHR) ได้รับการรับรองในปี พ.ศ. 2491 เพื่อเป็นกรอบสากลในการปกป้องสิทธิมนุษยชน" },

        // --- เศรษฐศาสตร์ ---
        { cat: "เศรษฐศาสตร์", q: "ปัญหาพื้นฐานทางเศรษฐศาสตร์ (What, How, For whom) เกิดขึ้นจากสภาวการณ์ใด?", a: ["ระบบการกระจายรายได้ที่ไม่เท่าเทียม", "ความต้องการของมนุษย์มีไม่จำกัด แต่ทรัพยากรมีอยู่จำกัด", "รัฐบาลแทรกแซงราคาตลาด", "การเปลี่ยนแปลงของระดับราคาสินค้า"], correct: 1, explanation: "ปัญหาพื้นฐานทางเศรษฐศาสตร์เกิดจากความขัดแย้งระหว่าง 'ความต้องการที่มีไม่จำกัด' กับ 'ความขาดแคลนของทรัพยากร'" },
        { cat: "เศรษฐศาสตร์", q: "โครงสร้างตลาดประเภทใดที่มีผู้ขายในระบบเพียงไม่กี่ราย แต่ละรายมีส่วนแบ่งตลาดสูง?", a: ["ตลาดแข่งขันสมบูรณ์", "ตลาดผูกขาดแท้จริง", "ตลาดผู้ขายน้อยราย", "ตลาดกึ่งแข่งขันกึ่งผูกขาด"], correct: 2, explanation: "ตลาดผู้ขายน้อยราย (Oligopoly) มีผู้ผลิตเพียงไม่กี่รายใหญ่ เช่น ธุรกิจค่ายมือถือ" },
        { cat: "เศรษฐศาสตร์", q: "ตาม 'กฎของอุปสงค์' ภายใต้เงื่อนไขที่ปัจจัยอื่นๆ คงที่ พฤติกรรมของผู้บริโภคจะเป็นอย่างไร?", a: ["เมื่อราคาสินค้าสูงขึ้น ปริมาณความต้องการซื้อจะลดลง", "เมื่อราคาสินค้าสูงขึ้น ปริมาณความต้องการซื้อจะเพิ่มขึ้น", "เมื่อราคาสินค้าลดลง ปริมาณความต้องการผลิตจะเพิ่มขึ้น", "ราคาสินค้าและปริมาณความต้องการซื้อแปรผันตรงกัน"], correct: 0, explanation: "กฎของอุปสงค์ระบุว่า ปริมาณความต้องการซื้อจะแปรผกผัน (ตรงข้าม) กับราคาเสมอ" },
        { cat: "เศรษฐศาสตร์", q: "หากระบบเศรษฐกิจเผชิญ 'เงินเฟ้อรุนแรง' รัฐบาลและธนาคารกลางควรทำอย่างไร?", a: ["ลดดอกเบี้ยนโยบายและลดภาษี", "เพิ่มการใช้จ่ายรัฐบาลและซื้อพันธบัตรคืน", "เพิ่มดอกเบี้ยนโยบายและปรับเพิ่มภาษี", "ลดอัตราเงินสดสำรองตามกฎหมาย"], correct: 2, explanation: "การแก้เงินเฟ้อต้องดึงเงินออกจากระบบ รัฐจึงต้องใช้นโยบายแบบหดตัว (เพิ่มภาษี) และเพิ่มดอกเบี้ย" },
        { cat: "เศรษฐศาสตร์", q: "เครื่องชี้วัดทางเศรษฐกิจใดที่คำนวณมูลค่ารวมของสินค้าที่ผลิต 'ภายในขอบเขตประเทศ'?", a: ["GNP", "GDP", "NI", "PCI"], correct: 1, explanation: "GDP (Gross Domestic Product) คือ มูลค่าตลาดของสินค้าและบริการขั้นสุดท้ายที่ผลิตขึ้นภายในประเทศ" },
        { cat: "เศรษฐศาสตร์", q: "ทฤษฎีของ เดวิด ริคาร์โด ที่สนับสนุนให้ผลิตสินค้าที่มีต้นทุนค่าเสียโอกาสต่ำที่สุด เรียกว่าทฤษฎีใด?", a: ["ความได้เปรียบโดยสัมบูรณ์", "ความได้เปรียบโดยเปรียบเทียบ", "พาณิชยนิยม", "ดุลยภาพการค้าเสรี"], correct: 1, explanation: "ทฤษฎีความได้เปรียบโดยเปรียบเทียบ เสนอให้เลือกผลิตสินค้าที่มีต้นทุนค่าเสียโอกาสต่ำที่สุดแล้วมาค้าขายกัน" },
        { cat: "เศรษฐศาสตร์", q: "ระบบเศรษฐกิจแบบ 'ทุนนิยมบริสุทธิ์' มีลักษณะเด่นที่สุดตามข้อใด?", a: ["เอกชนมีกรรมสิทธิ์ในทรัพย์สิน และใช้กลไกราคาโดยรัฐไม่แทรกแซง", "รัฐบาลเป็นเจ้าของปัจจัยการผลิตหลัก", "เน้นสวัสดิการที่เท่าเทียม", "รัฐบาลกำหนดราคาสินค้าขั้นพื้นฐาน"], correct: 0, explanation: "ระบบทุนนิยมเน้นเสรีภาพทางธุรกิจ กรรมสิทธิ์ของเอกชน และใช้กลไกราคาในการจัดสรรทรัพยากร" },
        { cat: "เศรษฐศาสตร์", q: "ภาษีประเภทใดที่จัดเป็น 'ภาษีทางตรง' ซึ่งผลักภาระภาษีไม่ได้?", a: ["ภาษีมูลค่าเพิ่ม (VAT)", "ภาษีสรรพสามิต", "ภาษีเงินได้บุคคลธรรมดา", "ภาษีศุลกากร"], correct: 2, explanation: "ภาษีทางตรง คือ ภาษีที่ผู้มีหน้าที่เสียภาษีต้องรับภาระไว้เอง เช่น ภาษีเงินได้บุคคลธรรมดา" },
        { cat: "เศรษฐศาสตร์", q: "หลักการดำเนินงานของ 'สหกรณ์' แตกต่างจากบริษัทจำกัดอย่างไรชัดเจนที่สุด?", a: ["มุ่งแสวงหากำไรสูงสุด", "จำกัดสิทธิ์สมาชิกเฉพาะผู้ในชุมชนเดียวกัน", "ยึดหลักสมาชิก 1 คนมีสิทธิ์ออกเสียง 1 เสียง", "บริหารงานโดยรัฐบาล"], correct: 2, explanation: "สหกรณ์ยึดหลักประชาธิปไตย สมาชิก 1 คน มี 1 เสียง (One Man, One Vote) เสมอกัน โดยไม่นับตามจำนวนหุ้น" },
        { cat: "เศรษฐศาสตร์", q: "ในปรัชญาเศรษฐกิจพอเพียง 'เงื่อนไขความรู้และเงื่อนไขคุณธรรม' ทำหน้าที่อย่างไร?", a: ["เป็นฐานรองรับและกำกับการตัดสินใจในความพอประมาณและมีเหตุผล", "เป็นเป้าหมายปลายทางที่ต้องการให้เกิดขึ้น", "เป็นตัวขับเคลื่อนเพื่อการแข่งขันทางการค้า", "เป็นปัจจัยการผลิตพื้นฐาน"], correct: 0, explanation: "เงื่อนไขความรู้และคุณธรรม เป็นฐานเพื่อใช้เป็นแนวทางกำกับการตัดสินใจให้ห่วงทั้ง 3 ดำเนินไปอย่างสมดุล" },
        { cat: "เศรษฐศาสตร์", q: "หากค่าเงินบาท 'แข็งค่าขึ้น' จะส่งผลบวกต่อใครมากที่สุด?", a: ["ผู้ประกอบการส่งออกสินค้าเกษตร", "ผู้ประกอบการนำเข้าเครื่องจักรจากต่างประเทศ", "ธุรกิจการท่องเที่ยวที่รับเงินต่างชาติ", "แรงงานไทยที่ส่งเงินกลับมาจากต่างประเทศ"], correct: 1, explanation: "เงินบาทแข็งค่า ส่งผลดีต่อผู้นำเข้าเพราะใช้เงินบาทน้อยลงในการซื้อสินค้าจากต่างประเทศ" },
        { cat: "เศรษฐศาสตร์", q: "เป้าหมายหลักของ 'ประชาคมเศรษฐกิจอาเซียน' (AEC) คืออะไร?", a: ["ใช้ระบบสกุลเงินเดียวกัน", "จัดตั้งสภานิติบัญญัติร่วม", "เปิดตลาดเสรีที่มีการเคลื่อนย้ายสินค้า บริการ การลงทุน เสรี", "ร่วมกำหนดโควตาราคาน้ำมัน"], correct: 2, explanation: "เป้าหมายหลักของ AEC คือ การทำให้ภูมิภาคอาเซียนเป็นตลาดและฐานการผลิตร่วมกัน เคลื่อนย้ายสินค้าเสรี" },

        // --- ประวัติศาสตร์ ---
        { cat: "ประวัติศาสตร์", q: "ขั้นตอนแรกสุดของ 'วิธีการทางประวัติศาสตร์' คืออะไร?", a: ["การรวบรวมหลักฐาน", "การประเมินความน่าเชื่อถือ", "การกำหนดหัวข้อหรือประเด็นปัญหาที่ศึกษา", "การวิเคราะห์และตีความ"], correct: 2, explanation: "ขั้นตอนแรกสุดคือ การตั้งประเด็นปัญหาหรือกำหนดหัวข้อ เพื่อกำหนดขอบเขตในการค้นคว้า" },
        { cat: "ประวัติศาสตร์", q: "ผลกระทบสำคัญทางเศรษฐกิจจาก 'สนธิสัญญาเบาว์ริง' สมัยรัชกาลที่ 4 คือข้อใด?", a: ["เปลี่ยนจากเศรษฐกิจพึ่งตนเองเป็นระบบเศรษฐกิจเพื่อการค้า", "พระคลังสินค้าผูกขาดการค้าได้มากขึ้น", "ไทยเสียเปรียบดุลการค้ารุนแรง", "ยกเลิกการใช้เงินตราและใช้การแลกเปลี่ยนสิ่งของ"], correct: 0, explanation: "สนธิสัญญาเบาว์ริงทำให้การผูกขาดโดยพระคลังสินค้าสิ้นสุดลง เปลี่ยนสู่ระบบเศรษฐกิจเพื่อการค้าเสรี" },
        { cat: "ประวัติศาสตร์", q: "การปฏิรูปโครงสร้างบริหารราชการแผ่นดินระดับรากฐานในสมัยรัชกาลที่ 5 คือข้อใด?", a: ["พ.ร.บ. เลิกทาส", "ยกเลิกระบบจตุสดมภ์และตั้ง 12 กระทรวง", "สร้างทางรถไฟ", "เจรจายกเลิกสิทธิสภาพนอกอาณาเขต"], correct: 1, explanation: "พ.ศ. 2435 ทรงยกเลิกระบบจตุสดมภ์ และปฏิรูปเป็น 12 กระทรวงแบบสากลแบ่งแยกหน้าที่ตามความเชี่ยวชาญ" },
        { cat: "ประวัติศาสตร์", q: "การปฏิวัติเปลี่ยนแปลงการปกครอง 24 มิถุนายน พ.ศ. 2475 กระทำโดยกลุ่มใด?", a: ["คณะราษฎร", "คณะ ร.ศ. 130", "ขบวนการเสรีไทย", "สมาคมกรรมกรสยาม"], correct: 0, explanation: "การเปลี่ยนแปลงการปกครอง 2475 นำโดย 'คณะราษฎร' ปรับเปลี่ยนระบอบสมบูรณาญาสิทธิราชย์มาเป็นประชาธิปไตย" },

    /* ================= 2. ตัวแปรระบบ ================= */
    let studentName = "";
    let studentId = "";
    let shuffledQuiz = [];
    let currentQuestionIndex = 0;
    let userAnswers = []; // เก็บคำตอบที่ผู้ใช้เลือก
    let selectedChoiceIndex = null;
    let score = 0;

    const appDiv = document.getElementById("app");

    /* ================= 3. ฟังก์ชันระบบ ================= */

    // --- เริ่มต้นแสดงหน้า Login ---
    function renderLogin() {
        appDiv.innerHTML = `
            <h1>เข้าสู่ระบบติวสังคม TCAS</h1>
            <p style="text-align:center; color:#94a3b8; margin-bottom:20px;">กรุณากรอกข้อมูลเพื่อบันทึกคะแนน</p>
            <input type="text" id="input-name" class="input-box" placeholder="ชื่อ-นามสกุล">
            <input type="number" id="input-id" class="input-box" placeholder="เลขที่">
            <button class="btn" onclick="startExam()">เริ่มทำข้อสอบ (60 ข้อ)</button>
        `;
    }

    // --- กดปุ่มเริ่มทำข้อสอบ ---
    function startExam() {
        const nameVal = document.getElementById('input-name').value.trim();
        const idVal = document.getElementById('input-id').value.trim();

        if (!nameVal || !idVal) {
            alert("กรุณากรอกชื่อและเลขที่ให้ครบถ้วนก่อนเริ่มทำข้อสอบครับ");
            return;
        }

        studentName = nameVal;
        studentId = idVal;
        
        // สุ่มข้อสอบ
        shuffledQuiz = [...MASTER_QUIZ].sort(() => Math.random() - 0.5);
        
        // รีเซ็ตค่า
        currentQuestionIndex = 0;
        userAnswers = [];
        score = 0;

        renderQuestion();
    }

    // --- แสดงหน้าข้อสอบ ---
    function renderQuestion() {
        selectedChoiceIndex = null; // รีเซ็ตช้อยส์ที่เลือก
        const qData = shuffledQuiz[currentQuestionIndex];

        let choicesHTML = "";
        qData.a.forEach((choice, index) => {
            choicesHTML += `<button class="choice-btn" id="choice-${index}" onclick="selectChoice(${index})">${index + 1}. ${choice}</button>`;
        });

        appDiv.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#94a3b8; font-size:14px;">
                <span>ผู้สอบ: ${studentName} (เลขที่ ${studentId})</span>
                <span>หมวด: ${qData.cat} | ข้อที่ ${currentQuestionIndex + 1} / ${shuffledQuiz.length}</span>
            </div>
            <hr style="border-color:#475569; margin-bottom:20px;">
            
            <div class="question-text">${qData.q}</div>
            <div id="choices-container">
                ${choicesHTML}
            </div>
            
            <button class="btn" style="margin-top:20px;" onclick="nextQuestion()">ข้อต่อไป / ยืนยัน</button>
        `;
    }

    // --- เมื่อคลิกเลือกช้อยส์ ---
    function selectChoice(index) {
        selectedChoiceIndex = index;
        
        // ล้าง class 'selected' ออกจากทุกปุ่ม
        const buttons = document.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.classList.remove('selected'));
        
        // ใส่ class 'selected' ให้ปุ่มที่คลิก
        document.getElementById(`choice-${index}`).classList.add('selected');
    }

    // --- ไปข้อต่อไป หรือ สรุปผล ---
    function nextQuestion() {
        if (selectedChoiceIndex === null) {
            alert("กรุณาเลือกคำตอบก่อนไปข้อต่อไปครับ");
            return;
        }

        // เก็บคำตอบของผู้ใช้
        userAnswers.push(selectedChoiceIndex);
        
        // เช็คคะแนน (เทียบกับ key "correct" ของข้อมูลเรา)
        if (selectedChoiceIndex === shuffledQuiz[currentQuestionIndex].correct) {
            score++;
        }

        currentQuestionIndex++;

        // เช็คว่าจบข้อสอบหรือยัง
        if (currentQuestionIndex < shuffledQuiz.length) {
            renderQuestion();
        } else {
            finishExam();
        }
    }

    // --- จบการสอบ (คำนวณและแสดงผล) ---
    function finishExam() {
        // 1. บันทึกคะแนนลง Leaderboard (LocalStorage)
        let board = JSON.parse(localStorage.getItem('tcasSocialBoardFull')) || [];
        board.push({ 
            name: studentName, 
            id: studentId, 
            score: score, 
            total: shuffledQuiz.length,
            date: new Date().toLocaleDateString() 
        });
        // เรียงลำดับคะแนนจากมากไปน้อย
        board.sort((a, b) => b.score - a.score);
        localStorage.setItem('tcasSocialBoardFull', JSON.stringify(board));

        // 2. สร้าง HTML ตาราง Leaderboard
        let boardHTML = "";
        board.forEach((user, index) => {
            boardHTML += `<tr>
                <td>${index + 1}</td>
                <td>${user.name}</td>
                <td>${user.id}</td>
                <td>${user.score}/${user.total}</td>
            </tr>`;
        });

        // 3. สร้าง HTML เฉลยละเอียด
        let reviewHTML = "<h3>เฉลยและคำอธิบายแบบละเอียด</h3>";
        shuffledQuiz.forEach((qData, index) => {
            const userAnswer = userAnswers[index];
            const isCorrect = userAnswer === qData.correct;
            const boxClass = isCorrect ? "correct" : "wrong";

            reviewHTML += `
                <div class="review-box ${boxClass}">
                    <p style="font-weight:bold; color: #f8fafc;">ข้อ ${index + 1}: ${qData.q}</p>
                    <p style="margin-top:10px; font-size:14px; color: #cbd5e1;">
                        📝 คำตอบของคุณ: ${qData.a[userAnswer]} <br>
                        🎯 คำตอบที่ถูกต้อง: <span style="color:#10b981; font-weight:bold;">${qData.a[qData.correct]}</span>
                    </p>
                    <div class="explanation">
                        <strong>💡 คำอธิบาย:</strong> ${qData.explanation}
                    </div>
                </div>
            `;
        });

        // 4. แสดงผลหน้าสรุปทั้งหมด
        appDiv.innerHTML = `
            <h2>สรุปผลการทดสอบ</h2>
            <div class="score-display">
                คะแนนของคุณ: ${score} / ${shuffledQuiz.length}
            </div>
            
            <h3 style="margin-top:30px; text-align:left;">🏆 Leaderboard (อันดับคะแนน)</h3>
            <table>
                <tr>
                    <th>อันดับ</th><th>ชื่อ-นามสกุล</th><th>เลขที่</th><th>คะแนน</th>
                </tr>
                ${boardHTML}
            </table>
            
            <hr style="border-color:#475569; margin:30px 0;">
            
            ${reviewHTML}

            <button class="btn" style="margin-top:30px; background:#0ea5e9;" onclick="location.reload()">กลับไปหน้าแรก / ทำใหม่</button>
        `;
    }

    // เริ่มต้นโปรแกรมด้วยการแสดงหน้า Login
    renderLogin();

</script>
</body>
</html>
