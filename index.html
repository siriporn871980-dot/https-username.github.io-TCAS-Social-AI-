<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TCAS Social AI</title>

<style>

body{
background:#111827;
font-family:Arial;
color:white;
text-align:center;
padding:40px;
}

.card{
background:#1f2937;
padding:30px;
border-radius:20px;
max-width:600px;
margin:auto;
}

button{
background:#3b82f6;
color:white;
padding:15px 25px;
border:none;
border-radius:12px;
font-size:18px;
margin:10px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="card" id="app">

<h1>🏛 TCAS Social AI</h1>

<h2>เว็บติว A-Level สังคม</h2>

<p>ฝึกทำข้อสอบและวัดคะแนนของคุณ</p>

<button onclick="startQuiz()">
เริ่มทำข้อสอบ
</button>

</div>


<script>

let question = 0;
let score = 0;


let quiz = [

{
q:"ข้อใดเป็นกฎหมายสูงสุดของประเทศไทย?",
a:["รัฐธรรมนูญ","พระราชบัญญัติ","กฎกระทรวง","ประกาศ"],
correct:0
},

{
q:"อำนาจอธิปไตยเป็นของใคร?",
a:["รัฐบาล","ประชาชน","ศาล","ทหาร"],
correct:1
},

{
q:"เศรษฐศาสตร์ศึกษาสิ่งใด?",
a:["การใช้ทรัพยากรที่มีจำกัด","ดวงดาว","ภาษา","ศิลปะ"],
correct:0
}

];


function startQuiz(){

showQuestion();

}


function showQuestion(){

let q = quiz[question];

document.getElementById("app").innerHTML = `

<h1>📚 ข้อ ${question+1}</h1>

<h2>${q.q}</h2>

${q.a.map((x,i)=>
`<button onclick="answer(${i})">${x}</button>`
).join("")}

`;

}


function answer(choice){

if(choice==quiz[question].correct){
score++;
}

question++;

if(question < quiz.length){

showQuestion();

}else{

document.getElementById("app").innerHTML=`

<h1>🎉 เสร็จสิ้น</h1>

<h2>คะแนนของคุณ ${score}/${quiz.length}</h2>

<button onclick="location.reload()">
กลับหน้าแรก
</button>

`;

}

}


</script>


</body>
</html>
